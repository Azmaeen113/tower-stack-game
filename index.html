<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SPIRAL DROP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0118;
    --bg-deep2:#150726;
    --cyan:#00e5ff;
    --magenta:#ff2e9c;
    --orange:#ff8a00;
    --gold:#ffd23f;
    --danger:#ff2d55;
    --white:#f4f1ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--bg-deep);
    font-family:'Rajdhani',sans-serif;
    position:fixed;inset:0;
  }
  #app{
    position:fixed;inset:0;
    width:100%;height:100%;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, rgba(255,46,156,0.25), transparent 60%),
      radial-gradient(ellipse 100% 50% at 50% 100%, rgba(0,229,255,0.18), transparent 60%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-deep2) 45%, #1a0a2e 100%);
  }

  /* starfield / rays background */
  #bgCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
  #gameCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;display:block;}

  /* ---------- HUD ---------- */
  #hud{
    position:absolute;top:0;left:0;right:0;
    z-index:10;
    display:flex;flex-direction:column;align-items:center;
    padding-top:calc(18px + env(safe-area-inset-top));
    pointer-events:none;
    opacity:0;
    transition:opacity .45s ease;
  }
  #hud.visible{opacity:1;}
  .score-wrap{
    display:flex;align-items:baseline;gap:6px;
    filter:drop-shadow(0 0 18px rgba(0,229,255,0.55));
  }
  #score{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:56px;
    line-height:1;
    background:linear-gradient(180deg,#ffffff 0%, var(--cyan) 55%, #0091a8 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    letter-spacing:1px;
  }
  #scoreLabel{
    font-family:'Orbitron',sans-serif;
    font-size:12px;font-weight:700;letter-spacing:4px;
    color:var(--magenta);
    text-shadow:0 0 12px rgba(255,46,156,0.8);
    margin-top:2px;
  }
  #best{
    margin-top:6px;
    font-size:14px;font-weight:600;letter-spacing:2px;
    color:rgba(255,255,255,0.55);
  }
  #best span{color:var(--gold);font-weight:700;}

  /* top-left mute */
  #muteBtn{
    position:absolute;
    top:calc(16px + env(safe-area-inset-top));
    left:16px;
    width:44px;height:44px;border-radius:50%;
    background:rgba(20,8,35,0.6);
    border:1.5px solid rgba(255,255,255,0.18);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    pointer-events:all;
    z-index:20;
  }
  #muteBtn svg{width:20px;height:20px;fill:var(--white);opacity:0.9;}

  /* ---------- TITLE SCREEN ---------- */
  #titleScreen{
    position:absolute;inset:0;z-index:30;
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;
    padding:calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
    transition:opacity .5s ease, transform .5s ease;
  }
  #titleScreen.hidden{opacity:0;transform:scale(1.05);pointer-events:none;}

  .logo{
    text-align:center;
    line-height:1.1;
    filter:drop-shadow(0 6px 0 rgba(0,0,0,0.35)) drop-shadow(0 0 30px rgba(255,46,156,0.4));
  }
  .logo .l1{
    display:block;
    font-family:'Orbitron',sans-serif;
    font-weight:800;
    font-size:15vw;
    max-font-size:74px;
    background:linear-gradient(180deg,#ffffff 0%, #c9b6ff 40%, var(--magenta) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    letter-spacing:2px;
    -webkit-text-stroke:1.5px rgba(255,255,255,0.25);
  }
  .logo .l2{
    display:block;
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:19vw;
    background:linear-gradient(180deg,#fff6d0 0%, var(--gold) 30%, var(--orange) 70%, #b3450a 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    letter-spacing:1px;
    -webkit-text-stroke:1.5px rgba(255,255,255,0.2);
    margin-top:0.22em;
  }
  @media (min-width:480px){
    .logo .l1{font-size:64px;}
    .logo .l2{font-size:84px;}
  }

  .spacer{flex:1;}

  #playBtn{
    pointer-events:all;
    margin-top:48px;
    width:118px;height:118px;border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, #ff9a4d, var(--orange) 45%, #c94f00 100%);
    box-shadow:
      0 0 0 6px rgba(255,138,0,0.15),
      0 0 40px rgba(255,138,0,0.65),
      0 10px 0 #8f3600,
      inset 0 4px 10px rgba(255,255,255,0.4),
      inset 0 -8px 14px rgba(0,0,0,0.35);
    display:flex;align-items:center;justify-content:center;
    border:none;
    animation:pulse 2.2s ease-in-out infinite;
    position:relative;
  }
  #playBtn:active{transform:translateY(6px);box-shadow:0 0 0 6px rgba(255,138,0,0.15),0 0 40px rgba(255,138,0,0.65),inset 0 4px 10px rgba(255,255,255,0.4),inset 0 -8px 14px rgba(0,0,0,0.35);}
  #playBtn svg{width:46px;height:46px;fill:#2b0e00;margin-left:5px;filter:drop-shadow(0 2px 0 rgba(255,255,255,0.3));}
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.045);}
  }

  /* ---------- GAME OVER ---------- */
  #gameOverScreen{
    position:absolute;inset:0;z-index:40;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 40%, rgba(30,4,40,0.85), rgba(6,1,14,0.95));
    opacity:0;pointer-events:none;
    transition:opacity .35s ease;
  }
  #gameOverScreen.show{opacity:1;pointer-events:all;}
  #gameOverScreen .goTitle{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:15vw;
    max-width:340px;
    background:linear-gradient(180deg,#fff 0%, var(--danger) 60%, #7a0018 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    letter-spacing:1px;
    text-align:center;
    filter:drop-shadow(0 0 30px rgba(255,45,85,0.55));
  }
  @media (min-width:480px){#gameOverScreen .goTitle{font-size:58px;}}
  .goScoreRow{
    margin-top:22px;
    display:flex;gap:34px;
  }
  .goStat{display:flex;flex-direction:column;align-items:center;}
  .goStat .n{
    font-family:'Orbitron',sans-serif;font-weight:800;font-size:34px;
    color:var(--white);
  }
  .goStat.best .n{color:var(--gold);text-shadow:0 0 14px rgba(255,210,63,0.6);}
  .goStat .lbl{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.5);margin-top:2px;}
  .newBest{
    margin-top:10px;
    font-family:'Orbitron',sans-serif;
    font-size:12px;letter-spacing:3px;font-weight:700;
    color:var(--gold);
    text-shadow:0 0 14px rgba(255,210,63,0.7);
    opacity:0;
    animation:flicker 1.4s ease-in-out infinite;
  }
  .newBest.on{opacity:1;}
  @keyframes flicker{0%,100%{opacity:.4;}50%{opacity:1;}}

  #retryBtn{
    margin-top:34px;
    pointer-events:all;
    display:flex;align-items:center;gap:10px;
    padding:16px 38px;
    border-radius:50px;
    border:none;
    background:linear-gradient(180deg, var(--cyan), #007b91);
    box-shadow:0 8px 0 #004a58, 0 0 30px rgba(0,229,255,0.5), inset 0 2px 6px rgba(255,255,255,0.4);
    font-family:'Orbitron',sans-serif;
    font-weight:800;font-size:15px;letter-spacing:3px;
    color:#00232b;
  }
  #retryBtn:active{transform:translateY(6px);box-shadow:0 2px 0 #004a58, 0 0 30px rgba(0,229,255,0.5);}
  #retryBtn svg{width:18px;height:18px;fill:#00232b;}

  /* combo popup */
  #comboPopup{
    position:absolute;
    z-index:15;
    left:50%;top:42%;
    transform:translate(-50%,-50%) scale(0.6);
    font-family:'Orbitron',sans-serif;
    font-weight:800;
    font-size:26px;
    color:var(--gold);
    text-shadow:0 0 18px rgba(255,210,63,0.9), 0 0 6px #fff;
    opacity:0;
    pointer-events:none;
    white-space:nowrap;
  }
  #comboPopup.play{animation:comboPop .65s cubic-bezier(.2,1.4,.4,1) forwards;}
  @keyframes comboPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.4);}
    30%{opacity:1;transform:translate(-50%,-50%) scale(1.15);}
    60%{opacity:1;transform:translate(-50%,-55%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-90%) scale(0.9);}
  }

  /* flash on hit */
  #flash{
    position:absolute;inset:0;z-index:25;
    background:var(--danger);
    opacity:0;pointer-events:none;
  }
  #flash.play{animation:flashHit .3s ease-out;}
  @keyframes flashHit{0%{opacity:0.55;}100%{opacity:0;}}

  .hint-swipe{
    position:absolute;
    bottom:calc(26px + env(safe-area-inset-bottom));
    left:0;right:0;
    text-align:center;
    font-family:'Orbitron',sans-serif;
    font-size:11px;letter-spacing:3px;font-weight:700;
    color:rgba(255,255,255,0.4);
    z-index:8;
    opacity:0;
    transition:opacity .4s;
  }
  .hint-swipe.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <canvas id="bgCanvas"></canvas>
  <canvas id="gameCanvas"></canvas>

  <div id="flash"></div>
  <div id="comboPopup"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="score-wrap">
      <div id="score">0</div>
    </div>
    <div id="scoreLabel">LAYERS CLEARED</div>
    <div id="best">BEST&nbsp;<span id="bestVal">0</span></div>
  </div>

  <button id="muteBtn" aria-label="Mute">
    <svg id="muteIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2-4.24v8.47c1.23-.94 2-2.46 2-4.23z"/><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>

  <div class="hint-swipe" id="dragHint">DRAG TO ROTATE</div>

  <!-- Title -->
  <div id="titleScreen">
    <div class="logo">
      <span class="l1">SPIRAL</span>
      <span class="l2">DROP</span>
    </div>
    <button id="playBtn" aria-label="Play">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>

  <!-- Game Over -->
  <div id="gameOverScreen">
    <div class="goTitle">SHATTERED</div>
    <div class="goScoreRow">
      <div class="goStat">
        <div class="n" id="goScore">0</div>
        <div class="lbl">SCORE</div>
      </div>
      <div class="goStat best">
        <div class="n" id="goBest">0</div>
        <div class="lbl">BEST</div>
      </div>
    </div>
    <div class="newBest" id="newBestTag">NEW BEST!</div>
    <button id="retryBtn">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08a5.99 5.99 0 0 1-5.65 4c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      RETRY
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* =========================================================
   SPIRAL DROP
   A 3D helix-descent arcade game.
   Ball falls through a rotating tower of spiral platform
   bands; player drags to rotate the tower so the ball
   passes through gaps and avoids red danger segments.
   ========================================================= */

/* ---------------- Audio (synth, no external files) ---------------- */
const Audio_ = (function(){
  let ctx = null;
  let muted = false;
  function ensure(){
    if(!ctx){
      ctx = new (window.AudioContext||window.webkitAudioContext)();
    }
    if(ctx.state === 'suspended') ctx.resume();
  }
  function tone(freq, dur, type, gainPeak, delay, glideTo){
    if(muted) return;
    ensure();
    const t0 = ctx.currentTime + (delay||0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if(glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0+dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(gainPeak||0.25, t0+0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0+dur+0.02);
  }
  function noiseBurst(dur, gainPeak, delay){
    if(muted) return;
    ensure();
    const t0 = ctx.currentTime + (delay||0);
    const bufferSize = ctx.sampleRate * dur;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 1200;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(gainPeak||0.3, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    src.connect(filt).connect(gain).connect(ctx.destination);
    src.start(t0);
  }
  return {
    bounce(pitch){ tone(340+pitch*30, 0.11, 'triangle', 0.22); },
    pass(streak){
      const base = 520 + Math.min(streak,10)*40;
      tone(base, 0.09, 'sine', 0.18);
      tone(base*1.5, 0.09, 'sine', 0.08, 0.03);
    },
    hit(){
      tone(180, 0.28, 'sawtooth', 0.3, 0, 60);
      noiseBurst(0.25, 0.35);
    },
    shatter(){
      noiseBurst(0.5, 0.4);
      tone(120, 0.5, 'sawtooth', 0.25, 0, 40);
    },
    swoosh(){ tone(900, 0.15, 'sine', 0.06, 0, 300); },
    click(){ tone(700, 0.05, 'square', 0.08); },
    setMuted(v){ muted = v; },
    getMuted(){ return muted; }
  };
})();

/* ---------------- Background starfield canvas ---------------- */
(function bgStars(){
  const c = document.getElementById('bgCanvas');
  const ctx = c.getContext('2d');
  let w,h,stars=[];
  function resize(){
    w = c.width = innerWidth * devicePixelRatio;
    h = c.height = innerHeight * devicePixelRatio;
    c.style.width = innerWidth+'px';
    c.style.height = innerHeight+'px';
    stars = [];
    const count = 90;
    for(let i=0;i<count;i++){
      stars.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: Math.random()*1.8*devicePixelRatio+0.4,
        a: Math.random()*0.6+0.15,
        tw: Math.random()*0.02+0.005,
        phase: Math.random()*Math.PI*2,
        hue: Math.random()<0.5 ? '0,229,255' : '255,46,156'
      });
    }
  }
  resize();
  window.addEventListener('resize', resize);
  let t=0;
  function draw(){
    ctx.clearRect(0,0,w,h);
    t += 1;
    for(const s of stars){
      const a = s.a + Math.sin(t*s.tw + s.phase)*0.25;
      ctx.beginPath();
      ctx.fillStyle = `rgba(${s.hue},${Math.max(0,a)})`;
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ---------------- Three.js game ---------------- */
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
// No distance fog — keeps lighting consistent as you descend

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 2.2, 11);
camera.lookAt(0, 0, 0);

function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

/* Lighting */
scene.add(new THREE.AmbientLight(0x8866ff, 0.55));
const spot = new THREE.SpotLight(0xffffff, 2.2, 40, Math.PI/4.2, 0.4, 1.2);
spot.position.set(0, 14, 6);
spot.target.position.set(0,-6,0);
scene.add(spot, spot.target);

const rimCyan = new THREE.PointLight(0x00e5ff, 3.5, 20);
rimCyan.position.set(-6, 2, 4);
scene.add(rimCyan);
const rimMagenta = new THREE.PointLight(0xff2e9c, 3.5, 20);
rimMagenta.position.set(6, -2, 4);
scene.add(rimMagenta);

/* central light beam (visual, like screenshot) */
const beamGeo = new THREE.CylinderGeometry(0.045, 0.045, 60, 12, 1, true);
const beamMat = new THREE.MeshBasicMaterial({
  color:0xffffff, transparent:true, opacity:0.55,
  blending:THREE.AdditiveBlending, depthWrite:false
});
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.y = 0;
scene.add(beam);

/* ---------------- Tower / spiral generation ---------------- */
const TOWER_GROUP = new THREE.Group();
scene.add(TOWER_GROUP);

const TAU = Math.PI * 2;
const _wDir = new THREE.Vector3();
const _wMat = new THREE.Matrix4();
const _wMatInv = new THREE.Matrix4();

/** World XZ angle → layer-local angle using Three.js transforms (matches rendered meshes). */
function worldAngleToLocal(layerGroup, worldAngle){
  _wDir.set(Math.cos(worldAngle), 0, Math.sin(worldAngle));
  layerGroup.updateWorldMatrix(true, false);
  _wMat.copy(layerGroup.matrixWorld).setPosition(0, 0, 0);
  _wMatInv.copy(_wMat).invert();
  _wDir.applyMatrix4(_wMatInv);
  let a = Math.atan2(_wDir.z, _wDir.x);
  if(a < 0) a += TAU;
  return a;
}

const LAYER_GAP = 1.85;
const TOWER_RADIUS = 2.35;
const LAYER_HEIGHT = 0.34;
const LAYER_TOP = LAYER_HEIGHT / 2;
const BALL_RADIUS = 0.32;
const RING_INNER = TOWER_RADIUS * 0.62;
const RING_OUTER = TOWER_RADIUS;
const BALL_ORBIT_R = RING_OUTER - BALL_RADIUS * 0.45; // outer rim — clearly on the platform
const BALL_WORLD_ANGLE = Math.PI / 2; // +Z = front of screen, x=0 keeps tower centred
const SEGMENTS_PER_LAYER = 8;
const GAP_SEGMENTS = 2;       // how many contiguous segments are "open"
const DANGER_CHANCE = 0.16;

const COLORS = [0x00e5ff, 0xff2e9c, 0xffd23f, 0xff8a00];
let colorCursor = 0;
function nextColor(){
  const c = COLORS[colorCursor % COLORS.length];
  colorCursor++;
  return c;
}

function makeArcSegmentGeometry(innerR, outerR, thetaStart, thetaLen, height){
  const shape = new THREE.Shape();
  const steps = 10;
  for(let i=0;i<=steps;i++){
    const a = thetaStart + (thetaLen*i/steps);
    const x = Math.cos(a)*outerR, y = Math.sin(a)*outerR;
    if(i===0) shape.moveTo(x,y); else shape.lineTo(x,y);
  }
  for(let i=steps;i>=0;i--){
    const a = thetaStart + (thetaLen*i/steps);
    const x = Math.cos(a)*innerR, y = Math.sin(a)*innerR;
    shape.lineTo(x,y);
  }
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, {depth:height, bevelEnabled:true, bevelThickness:0.05, bevelSize:0.04, bevelSegments:2, curveSegments:10});
  geo.rotateX(Math.PI/2);
  geo.translate(0,-height/2,0);
  return geo;
}

class Layer {
  constructor(y, index){
    this.y = y;
    this.index = index;
    this.group = new THREE.Group();
    this.group.position.y = y;
    this.rotation = Math.random()*Math.PI*2;
    this.group.rotation.y = this.rotation;
    this.segments = [];
    this.gapCleared = false;
    this.build();
    TOWER_GROUP.add(this.group);
  }
  build(){
    const segAngle = (Math.PI*2)/SEGMENTS_PER_LAYER;
    // pick gap start
    const gapStart = Math.floor(Math.random()*SEGMENTS_PER_LAYER);
    const dangerAllowed = this.index > 2; // first few layers safe
    let dangerIdx = -1;
    if(dangerAllowed && Math.random() < DANGER_CHANCE + Math.min(this.index*0.01,0.18)){
      do { dangerIdx = Math.floor(Math.random()*SEGMENTS_PER_LAYER); }
      while(dangerIdx >= gapStart && dangerIdx < gapStart+GAP_SEGMENTS);
    }
    const baseColor = nextColor();
    for(let s=0; s<SEGMENTS_PER_LAYER; s++){
      const isGap = (s >= gapStart && s < gapStart+GAP_SEGMENTS) ||
                    (gapStart+GAP_SEGMENTS > SEGMENTS_PER_LAYER && s < (gapStart+GAP_SEGMENTS)%SEGMENTS_PER_LAYER);
      if(isGap) continue;
      const isDanger = s === dangerIdx;
      const thetaStart = s*segAngle;
      const geo = makeArcSegmentGeometry(TOWER_RADIUS*0.62, TOWER_RADIUS, thetaStart, segAngle*0.94, 0.34);
      const color = isDanger ? 0xff2d55 : baseColor;
      const mat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: isDanger ? 0.55 : 0.35,
        metalness:0.55,
        roughness:0.28,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = false;
      this.group.add(mesh);
      this.segments.push({mesh, isGap:false, isDanger, thetaStart, thetaLen:segAngle*0.94});
    }
    // store gap info for collision
    this.gapStart = gapStart;
    this.gapEnd = gapStart+GAP_SEGMENTS;
    this.segAngle = segAngle;
  }
  // worldAngle: fixed angle in world space where the ball sits (we use 0).
  // Total rotation applied to this layer's ring = its own base rotation + the parent tower group's rotation.
  localAngle(worldAngle){
    return worldAngleToLocal(this.group, worldAngle);
  }
  segmentIndexAt(worldAngle){
    const local = this.localAngle(worldAngle);
    return Math.floor(local / this.segAngle) % SEGMENTS_PER_LAYER;
  }
  segmentIsGap(segIdx){
    for(let g = this.gapStart; g < this.gapEnd; g++){
      if((g % SEGMENTS_PER_LAYER) === segIdx) return true;
    }
    return false;
  }
  angleIsGap(worldAngle){
    if(this.segments.length === 0) return true;
    return this.segmentIsGap(this.segmentIndexAt(worldAngle));
  }
  isSolidAtAngle(worldAngle){
    return !this.angleIsGap(worldAngle);
  }
  angleIsDanger(worldAngle){
    const segIdx = this.segmentIndexAt(worldAngle);
    return this.segments.some(sg => sg.isDanger && Math.floor(sg.thetaStart / this.segAngle) === segIdx);
  }
  destroy(){
    TOWER_GROUP.remove(this.group);
    this.segments.forEach(sg=>{ sg.mesh.geometry.dispose(); sg.mesh.material.dispose(); });
  }
}

/* Base platform (floor cap, decorative) */
const floorGeo = new THREE.CylinderGeometry(TOWER_RADIUS+0.3, TOWER_RADIUS+0.6, 0.5, 32);
const floorMat = new THREE.MeshStandardMaterial({color:0x1a0a2e, metalness:0.6, roughness:0.4, emissive:0x2a0a3a, emissiveIntensity:0.3});
const floorMesh = new THREE.Mesh(floorGeo, floorMat);
scene.add(floorMesh);

/* ---------------- Ball ---------------- */
const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 24, 24);
const ballMat = new THREE.MeshStandardMaterial({
  color:0xffffff, emissive:0xff8a00, emissiveIntensity:0.5,
  metalness:0.3, roughness:0.25
});
const ball = new THREE.Mesh(ballGeo, ballMat);
scene.add(ball);

/* ball glow sprite */
const glowTexCanvas = document.createElement('canvas');
glowTexCanvas.width = glowTexCanvas.height = 128;
(function(){
  const g = glowTexCanvas.getContext('2d');
  const grad = g.createRadialGradient(64,64,0,64,64,64);
  grad.addColorStop(0,'rgba(255,200,120,0.9)');
  grad.addColorStop(0.4,'rgba(255,120,60,0.35)');
  grad.addColorStop(1,'rgba(255,80,40,0)');
  g.fillStyle = grad;
  g.fillRect(0,0,128,128);
})();
const glowTex = new THREE.CanvasTexture(glowTexCanvas);
const glowMat = new THREE.SpriteMaterial({map:glowTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false});
const glowSprite = new THREE.Sprite(glowMat);
glowSprite.scale.set(2.2,2.2,1);
ball.add(glowSprite);

/* Particle trail */
const MAX_PARTICLES = 60;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(MAX_PARTICLES*3);
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions,3));
const particleMat = new THREE.PointsMaterial({color:0xffd23f, size:0.12, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);
let particleList = []; // {x,y,z,life}

function spawnParticle(x,y,z){
  particleList.push({x,y,z,life:1});
  if(particleList.length>MAX_PARTICLES) particleList.shift();
}
function updateParticles(dt){
  for(const p of particleList) p.life -= dt*1.6;
  particleList = particleList.filter(p=>p.life>0);
  for(let i=0;i<MAX_PARTICLES;i++){
    if(i<particleList.length){
      const p = particleList[i];
      particlePositions[i*3]=p.x; particlePositions[i*3+1]=p.y; particlePositions[i*3+2]=p.z;
    } else {
      particlePositions[i*3]=9999; particlePositions[i*3+1]=9999; particlePositions[i*3+2]=9999;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;
}

/* Shatter particles (on hit) */
let shatterBits = [];
function spawnShatter(x,y,z,color){
  const group = new THREE.Group();
  const bits = [];
  for(let i=0;i<14;i++){
    const geo = new THREE.BoxGeometry(0.12,0.12,0.12);
    const mat = new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.6});
    const m = new THREE.Mesh(geo,mat);
    m.position.set(x,y,z);
    const ang = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*3;
    m.userData.vel = new THREE.Vector3(Math.cos(ang)*speed, Math.random()*4+2, Math.sin(ang)*speed);
    m.userData.rotVel = new THREE.Vector3(Math.random()*8,Math.random()*8,Math.random()*8);
    scene.add(m);
    bits.push(m);
  }
  shatterBits.push({bits, life:1.2});
}
function updateShatter(dt){
  for(const grp of shatterBits){
    grp.life -= dt;
    for(const m of grp.bits){
      m.userData.vel.y -= 9.8*dt;
      m.position.addScaledVector(m.userData.vel, dt);
      m.rotation.x += m.userData.rotVel.x*dt;
      m.rotation.y += m.userData.rotVel.y*dt;
      m.material.opacity = Math.max(0, grp.life/1.2);
      m.material.transparent = true;
    }
  }
  shatterBits = shatterBits.filter(g=>{
    if(g.life<=0){ g.bits.forEach(m=>{scene.remove(m); m.geometry.dispose(); m.material.dispose();}); return false; }
    return true;
  });
}

/* ---------------- Game state ---------------- */
let layers = [];
let score = 0;
let best = parseInt(localStorage.getItem('spiralDropBest')||'0',10);
document.getElementById('bestVal').textContent = best;

let gameState = 'title'; // title | playing | gameover | starting
let ballY = 0;
let ballVelY = 0;
let towerRotation = 0; // current rotation applied to whole tower group
let targetRotVel = 0;
let currentRotVel = 0;
let cameraTargetY = 2.2;
let comboStreak = 0;
let nextLayerIndex = 0;
let started = false;
let shakeTime = 0;
let prevBallY = -1.2;

const GRAVITY = -11.5;
// Bounce peak ≤ one stack gap: h = v²/(2g)
const BOUNCE_HEIGHT = LAYER_GAP * 0.78;
const BOUNCE_VEL = Math.sqrt(2 * Math.abs(GRAVITY) * BOUNCE_HEIGHT);
const MAX_UPWARD_VEL = BOUNCE_VEL;

function clearTower(){
  layers.forEach(l=>l.destroy());
  layers = [];
}

function buildInitialTower(){
  clearTower();
  nextLayerIndex = 0;
  const count = 26;
  for(let i=0;i<count;i++){
    const y = -i*LAYER_GAP - 3;
    const l = new Layer(y, i);
    if(i < 3){
      // first three layers fully open so the ball drops cleanly at start
      l.segments.forEach(sg=>{ l.group.remove(sg.mesh); });
      l.segments = [];
      l.gapStart = 0; l.gapEnd = SEGMENTS_PER_LAYER;
    }
    layers.push(l);
    nextLayerIndex = i+1;
  }
}

function addLayerAtBottom(){
  const y = layers.length ? layers[layers.length-1].y - LAYER_GAP : -3;
  const l = new Layer(y, nextLayerIndex++);
  layers.push(l);
}

function resetGame(){
  score = 0;
  comboStreak = 0;
  ballVelY = 0;
  towerRotation = 0;
  currentRotVel = 0;
  TOWER_GROUP.rotation.y = 0;
  buildInitialTower();
  // Start on top of the first ring surface, then drop
  const firstTop = layers[0].y + LAYER_TOP + BALL_RADIUS;
  ballY = firstTop + 0.15;
  prevBallY = ballY;
  ballVelY = -0.8;
  updateBallWorldPos();
  document.getElementById('score').textContent = '0';
}

function updateBallWorldPos(){
  ball.position.x = Math.cos(BALL_WORLD_ANGLE) * BALL_ORBIT_R;
  ball.position.z = Math.sin(BALL_WORLD_ANGLE) * BALL_ORBIT_R;
  ball.position.y = ballY;
}

function ballX(){ return Math.cos(BALL_WORLD_ANGLE) * BALL_ORBIT_R; }
function ballZ(){ return Math.sin(BALL_WORLD_ANGLE) * BALL_ORBIT_R; }

function layerTopY(l){ return l.y + LAYER_TOP; }
function layerBottomY(l){ return l.y - LAYER_TOP; }

function layerIsGapAtBall(l){
  return l.angleIsGap(BALL_WORLD_ANGLE);
}

function crossedPlaneDown(prevY, currY, planeY){
  return currY < prevY && prevY >= planeY - 0.02 && currY <= planeY + 0.02;
}

function crossedPlaneUp(prevY, currY, planeY){
  return currY > prevY && prevY <= planeY + 0.02 && currY >= planeY - 0.02;
}

function resolveCollisions(prevY){
  const topHit = (l) => layerTopY(l) + BALL_RADIUS;

  if(ballVelY < 0){
    const sorted = [...layers].sort((a, b) => b.y - a.y);
    for(const l of sorted){
      const surface = topHit(l);
      if(ballY < surface - 0.12) continue;
      if(!crossedPlaneDown(prevY, ballY, surface)) continue;

      if(layerIsGapAtBall(l)){
        if(l.angleIsDanger(BALL_WORLD_ANGLE)){ onDeath(); return; }
        if(!l.gapCleared){
          l.gapCleared = true;
          score++;
          comboStreak++;
          document.getElementById('score').textContent = score;
          Audio_.pass(comboStreak);
          showCombo(comboStreak);
        }
        continue;
      }

      ballY = surface + 0.01;
      ballVelY = BOUNCE_VEL;
      comboStreak = 0;
      Audio_.bounce(Math.random() * 3);
      spawnParticle(ballX(), ballY, ballZ());
      updateBallWorldPos();
      recycleLayers();
      return;
    }
  } else if(ballVelY > 0){
    const botHit = (l) => layerBottomY(l) - BALL_RADIUS;
    const sorted = [...layers].sort((a, b) => a.y - b.y);
    for(const l of sorted){
      if(layerIsGapAtBall(l)) continue;
      const underside = botHit(l);
      if(!crossedPlaneUp(prevY, ballY, underside)) continue;
      ballY = underside - 0.01;
      ballVelY = -ballVelY * 0.3;
      updateBallWorldPos();
      recycleLayers();
      return;
    }
  }

  recycleLayers();
}

/* ---------------- Input (drag to rotate) ---------------- */
let dragActive = false;
let lastX = 0;
let dragVelocity = 0;

function onPointerDown(e){
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  dragActive = true;
  lastX = x;
  dragVelocity = 0;
}
function onPointerMove(e){
  if(!dragActive) return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const dx = x - lastX;
  lastX = x;
  const rotDelta = dx * 0.0095;
  TOWER_GROUP.rotation.y += rotDelta;
  dragVelocity = rotDelta;
}
function onPointerUp(){
  dragActive = false;
  currentRotVel = dragVelocity * 6; // momentum
}
canvas.addEventListener('touchstart', onPointerDown, {passive:false});
canvas.addEventListener('touchmove', onPointerMove, {passive:false});
canvas.addEventListener('touchend', onPointerUp, {passive:false});
canvas.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);

/* ---------------- UI wiring ---------------- */
const titleScreen = document.getElementById('titleScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const playBtn = document.getElementById('playBtn');
const retryBtn = document.getElementById('retryBtn');
const muteBtn = document.getElementById('muteBtn');
const muteIcon = document.getElementById('muteIcon');
const flashEl = document.getElementById('flash');
const comboPopup = document.getElementById('comboPopup');
const dragHint = document.getElementById('dragHint');

function startGame(){
  Audio_.swoosh();
  titleScreen.classList.add('hidden');
  gameOverScreen.classList.remove('show');
  document.getElementById('hud').classList.add('visible');
  resetGame();
  gameState = 'playing';
  setTimeout(()=>{ dragHint.classList.add('show'); setTimeout(()=>dragHint.classList.remove('show'), 2200); }, 400);
}
function onDeath(){
  if(gameState !== 'playing') return;
  gameState = 'gameover';
  Audio_.shatter();
  shakeTime = 0.4;
  spawnShatter(ball.position.x, ball.position.y, ball.position.z, 0xff2d55);
  flashEl.classList.remove('play'); void flashEl.offsetWidth; flashEl.classList.add('play');
  if(score > best){
    best = score;
    localStorage.setItem('spiralDropBest', String(best));
    document.getElementById('newBestTag').classList.add('on');
  } else {
    document.getElementById('newBestTag').classList.remove('on');
  }
  document.getElementById('goScore').textContent = score;
  document.getElementById('goBest').textContent = best;
  document.getElementById('bestVal').textContent = best;
  setTimeout(()=>{ gameOverScreen.classList.add('show'); }, 550);
}
playBtn.addEventListener('click', startGame);
retryBtn.addEventListener('click', startGame);
muteBtn.addEventListener('click', ()=>{
  const m = !Audio_.getMuted();
  Audio_.setMuted(m);
  muteIcon.innerHTML = m
    ? '<path d="M16.5 12A4.5 4.5 0 0 0 14 8v1.79l2.48 2.48c.01-.09.02-.18.02-.27zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.943 8.943 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>'
    : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-.77-3.29-2-4.24v8.47c1.23-.94 2-2.46 2-4.23z"/><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
});

/* ---------------- Combo popup ---------------- */
const comboWords = ['NICE!','SMOOTH!','SLICK!','ON FIRE!','UNSTOPPABLE!','LEGENDARY!'];
function showCombo(streak){
  if(streak < 3) return;
  const idx = Math.min(Math.floor(streak/3)-1, comboWords.length-1);
  comboPopup.textContent = comboWords[idx] + ' x' + streak;
  comboPopup.classList.remove('play'); void comboPopup.offsetWidth; comboPopup.classList.add('play');
}

/* ---------------- Main loop ---------------- */
let lastTime = performance.now();

function checkCollisionAndScore(){
  resolveCollisions(prevBallY);
}

function recycleLayers(){
  while(layers.length < 30) addLayerAtBottom();
  if(layers.length > 0 && layers[0].y > ballY + 8){
    const old = layers.shift();
    old.destroy();
  }
}

function animate(now){
  requestAnimationFrame(animate);
  const dt = Math.min((now-lastTime)/1000, 0.033);
  lastTime = now;

  beam.material.opacity = 0.18 + Math.sin(now*0.003)*0.06;
  beam.rotation.y += dt*0.2;

  if(gameState === 'playing'){
    // Sub-step physics when falling fast so gaps are never skipped
    const dy = ballVelY;
    const steps = Math.max(1, Math.ceil(Math.abs(dy * dt) / (LAYER_GAP * 0.45)));
    const subDt = dt / steps;

    for(let s = 0; s < steps; s++){
      prevBallY = ballY;
      ballVelY += GRAVITY * subDt;
      ballVelY = Math.max(ballVelY, -22);
      ballVelY = Math.min(ballVelY, MAX_UPWARD_VEL);
      ballY += ballVelY * subDt;
      updateBallWorldPos();
      checkCollisionAndScore();
      if(gameState !== 'playing') break;
    }

    if(!dragActive){
      TOWER_GROUP.rotation.y += currentRotVel * dt * 10;
      currentRotVel *= 0.92;
    }

    if(Math.random() < 0.5) spawnParticle(ball.position.x + (Math.random()-0.5)*0.08, ball.position.y, ball.position.z);

    if(ballY < -600) onDeath();

    cameraTargetY = ball.position.y + 2.2;
  }

  camera.position.y += (cameraTargetY - camera.position.y) * Math.min(dt * 5, 1);
  camera.position.z += (10.5 - camera.position.z) * Math.min(dt * 4, 1);
  camera.position.x = 0;
  // Tower stays centred; ball sits on front rim at +Z
  const lookY = ball.position.y - 0.45;
  spot.position.set(0, camera.position.y + 12, camera.position.z - 4);
  spot.target.position.set(0, lookY, 0);
  rimCyan.position.set(-5, camera.position.y, camera.position.z - 5);
  rimMagenta.position.set(5, camera.position.y - 1, camera.position.z - 5);
  beam.position.y = camera.position.y - 2;
  beam.material.opacity = 0.22;
  TOWER_GROUP.position.y = 0;
  floorMesh.position.y = layers.length ? layers[layers.length-1].y - 1.2 : -30;
  camera.lookAt(0, lookY, 0);

  if(shakeTime > 0){
    shakeTime -= dt;
    camera.position.x = (Math.random()-0.5)*0.12*Math.max(shakeTime,0)*3;
  }

  updateParticles(dt);
  updateShatter(dt);

  // ball roll animation
  ball.rotation.x += (Math.abs(ballVelY)+2)*dt*0.6;
  ball.rotation.z += currentRotVel*2;

  renderer.render(scene, camera);
}

/* init idle scene behind title */
resetGame();
gameState = 'title';
// gently rotate tower for title screen ambience
function idleSpin(){
  if(gameState === 'title'){
    TOWER_GROUP.rotation.y += 0.0025;
  }
  requestAnimationFrame(idleSpin);
}
idleSpin();

requestAnimationFrame(animate);

})();
</script>
