<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER_STRIKE // Meteor Storm</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #05050a; font-family: 'Courier New', Courier, monospace; }
        #gameContainer { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; background: #05050a; box-shadow: 0 0 30px rgba(0,255,204,0.15); }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(5,5,10,0.88); backdrop-filter: blur(10px);
            color: #00ffcc; text-align: center; z-index: 10;
        }
        h1 {
            font-size: 2.8rem; letter-spacing: 6px; text-transform: uppercase;
            color: #ff0077; margin-bottom: 8px; font-weight: 900;
            text-shadow: 0 0 10px #ff0077, 0 0 25px #00ffcc;
            animation: glitch 1.2s linear infinite;
        }
        .subtitle { font-size: 0.85rem; color: rgba(0,255,204,0.55); letter-spacing: 4px; margin-bottom: 28px; text-transform: uppercase; }
        .btn {
            padding: 14px 44px; font-size: 1rem; font-family: inherit; font-weight: bold;
            background: transparent; border: 2px solid #ff0077; color: #ff0077;
            cursor: pointer; letter-spacing: 3px; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255,0,119,0.35);
        }
        .btn:hover, .btn:active { background: #ff0077; color: #05050a; box-shadow: 0 0 25px #ff0077; }
        .btn.sec { border-color: #00ffcc; color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.35); margin-top: 12px; }
        .btn.sec:hover, .btn.sec:active { background: #00ffcc; color: #05050a; box-shadow: 0 0 25px #00ffcc; }
        .menu-btns { display: flex; flex-direction: column; align-items: center; gap: 0; }
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 12px 16px;
            display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;
            pointer-events: none; z-index: 5;
        }
        .hpill {
            background: rgba(0,255,204,0.06); border: 1px solid rgba(0,255,204,0.25);
            border-radius: 4px; padding: 6px 12px; min-width: 72px;
            box-shadow: 0 0 12px rgba(0,255,204,0.08);
        }
        .hpill .lbl { font-size: 9px; letter-spacing: 3px; color: rgba(0,255,204,0.5); display: block; }
        .hpill .val { font-size: 18px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 8px #00ffcc; }
        .hpill.guns .val { color: #ff0077; text-shadow: 0 0 8px #ff0077; }
        .hpill.hp .val { color: #00ffcc; }
        .hidden { display: none !important; }
        .upgrade-toast {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.5rem; font-weight: 900; color: #ff0077; letter-spacing: 5px;
            text-shadow: 0 0 20px #ff0077, 0 0 40px #00ffcc; pointer-events: none; z-index: 8;
            opacity: 0; transition: opacity 0.3s;
        }
        .upgrade-toast.show { opacity: 1; }
        #hitAlert {
            position: absolute; inset: 0; pointer-events: none; z-index: 6;
            border: 4px solid transparent;
            box-shadow: inset 0 0 0 rgba(255,0,60,0);
        }
        #hitAlert.on {
            border-color: rgba(255,0,80,0.95);
            box-shadow: inset 0 0 100px 30px rgba(255,0,40,0.5);
        }
        #gameContainer.hit .hpill.hp {
            border-color: #ff0044 !important;
            background: rgba(255,0,60,0.12) !important;
            box-shadow: 0 0 22px rgba(255,0,80,0.65) !important;
        }
        #gameContainer.hit .hpill.hp .val {
            color: #ff2244 !important;
            text-shadow: 0 0 14px #ff0044 !important;
        }
        #damageToast {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.3rem; font-weight: 900; color: #ff2244; letter-spacing: 4px;
            text-shadow: 0 0 16px #ff0044, 0 0 30px #ff0077; pointer-events: none; z-index: 9;
            opacity: 0; transition: opacity 0.15s;
        }
        #damageToast.show { opacity: 1; }
        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff0077, -2px -2px #00ffcc; }
            25% { text-shadow: -2px 2px #ff0077, 2px -2px #00ffcc; }
            50% { text-shadow: 2px -2px #ff0077, -2px 2px #00ffcc; }
            75% { text-shadow: -2px -2px #ff0077, 2px 2px #00ffcc; }
            100% { text-shadow: 2px 2px #ff0077, -2px -2px #00ffcc; }
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="hud">
        <div class="hpill"><span class="lbl">SCORE</span><span class="val" id="scoreDisplay">0</span></div>
        <div class="hpill"><span class="lbl">STAGE</span><span class="val" id="stageDisplay">1</span></div>
        <div class="hpill guns"><span class="lbl">GUNS</span><span class="val" id="gunDisplay">×1</span></div>
        <div class="hpill hp"><span class="lbl">SHIELD</span><span class="val" id="hpDisplay">100</span></div>
    </div>
    <div id="upgradeToast" class="upgrade-toast"></div>
    <div id="damageToast"></div>
    <div id="hitAlert"></div>

    <div id="mainMenu" class="overlay">
        <h1>CYBER_STRIKE</h1>
        <p class="subtitle">DRAG TO FLY · NEON FIRE · DODGE GLOWING METEORS</p>
        <div class="menu-btns">
            <button class="btn" id="startInfBtn">∞ INFINITY HEALTH</button>
            <button class="btn sec" id="startNormBtn">NORMAL · 200 SHIELD</button>
        </div>
    </div>
    <div id="gameOverMenu" class="overlay hidden">
        <h1>SYSTEM_CRASH</h1>
        <p class="subtitle" id="finalScore">SCORE: 0</p>
        <button class="btn" id="restartBtn">REBOOT</button>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mainMenu = document.getElementById('mainMenu');
const gameOverMenu = document.getElementById('gameOverMenu');
const scoreDisplay = document.getElementById('scoreDisplay');
const stageDisplay = document.getElementById('stageDisplay');
const gunDisplay = document.getElementById('gunDisplay');
const hpDisplay = document.getElementById('hpDisplay');
const finalScore = document.getElementById('finalScore');
const upgradeToast = document.getElementById('upgradeToast');
const damageToast = document.getElementById('damageToast');
const hitAlert = document.getElementById('hitAlert');
const gameContainer = document.getElementById('gameContainer');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'laser') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.12);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
    } else if (type === 'explosion') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + 0.35);
        gain.gain.setValueAtTime(0.22, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
    } else if (type === 'hurt') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.setValueAtTime(80, now + 0.15);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'upgrade') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.setValueAtTime(880, now + 0.12);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
    }
}

let gameState = 'MENU';
let score = 0, stage = 1, lastTime = 0, bgScroll = 0;
let stars = [];
let toastTimer = 0;

const GUN_THRESHOLDS = [0, 400, 1200, 2800];
const STAGE_SCORE_BASE = 350;
const MAX_METEORS = 24;
const MAX_BULLETS = 100;
const MAX_PARTICLES = 70;
const NORMAL_MAX_HP = 200;
let godMode = false;
let lastInfinityMode = false;
let hitAlertTimer = 0;
let damageToastTimer = 0;

const ENEMY_SHOT_DAMAGE = 18;
const METEOR_LEAK_DAMAGE = 12;
let bgLayer = null;
let lastLaserSound = 0;

function entityLoad() {
    return meteors.length + bullets.length + particles.length;
}

function trimArrays() {
    while (particles.length > MAX_PARTICLES) particles.shift();
    while (bullets.length > MAX_BULLETS) bullets.shift();
}

function rebuildBgLayer() {
    bgLayer = document.createElement('canvas');
    bgLayer.width = canvas.width;
    bgLayer.height = canvas.height;
    const b = bgLayer.getContext('2d');
    const g = b.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.height);
    g.addColorStop(0, '#0f0c20');
    g.addColorStop(1, '#05050a');
    b.fillStyle = g;
    b.fillRect(0, 0, canvas.width, canvas.height);
    b.fillStyle = 'rgba(0,255,204,0.015)';
    b.fillRect(0, 0, canvas.width, canvas.height);
}

function gunLevelFromScore(s) {
    if (s >= GUN_THRESHOLDS[3]) return 4;
    if (s >= GUN_THRESHOLDS[2]) return 3;
    if (s >= GUN_THRESHOLDS[1]) return 2;
    return 1;
}

function gunOffsets(level) {
    const s = 14;
    if (level === 1) return [0];
    if (level === 2) return [-s, s];
    if (level === 3) return [-s * 1.4, 0, s * 1.4];
    return [-s * 2, -s * 0.65, s * 0.65, s * 2];
}

function resizeCanvas() {
    const maxW = 480, maxH = 800;
    let w = window.innerWidth, h = window.innerHeight;
    if (w / h > maxW / maxH) { canvas.height = h; canvas.width = h * (maxW / maxH); }
    else { canvas.width = w; canvas.height = w * (maxH / maxW); }
    initStars();
    rebuildBgLayer();
}
window.addEventListener('resize', resizeCanvas);

function initStars() {
    stars = [];
    const tints = ['#ffffff', '#00ffcc', '#ff0077', '#ffffff'];
    for (let i = 0; i < 60; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.8 + 0.3,
            spd: Math.random() * 0.6 + 0.2,
            a: Math.random() * 0.5 + 0.3,
            color: tints[Math.floor(Math.random() * tints.length)]
        });
    }
}
resizeCanvas();

function showToast(msg) {
    upgradeToast.textContent = msg;
    upgradeToast.classList.add('show');
    toastTimer = 90;
    playSound('upgrade');
}

function showDamageToast(msg) {
    damageToast.textContent = msg;
    damageToast.classList.add('show');
    damageToastTimer = 50;
}

function triggerHitAlert(strong) {
    hitAlertTimer = strong ? 50 : 35;
    hitAlert.classList.add('on');
    gameContainer.classList.add('hit');
}

function damagePlayer(amount, fromEnemyShot) {
    if (godMode) return;
    player.hp = Math.max(0, player.hp - amount);
    playSound('hurt');
    triggerHitAlert(fromEnemyShot);
    if (fromEnemyShot) showDamageToast('-' + amount + ' SHIELD');
}

// Glowing meteor types — dark rocky core + neon aura
const METEOR_TYPES = [
    { id: 'rock',   fill: '#0a0a0a', edge: '#151515', crater: '#000000', glow: '#00ffcc', pts: 7 },
    { id: 'iron',   fill: '#0c0c14', edge: '#1a1a28', crater: '#050508', glow: '#6688ff', pts: 6 },
    { id: 'carbon', fill: '#050505', edge: '#111111', crater: '#000000', glow: '#ff0077', pts: 8 },
    { id: 'rust',   fill: '#120a06', edge: '#2a1810', crater: '#080404', glow: '#ff6600', pts: 7 },
    { id: 'ice',    fill: '#060c14', edge: '#102030', crater: '#030608', glow: '#00ccff', pts: 6 },
    { id: 'lava',   fill: '#100604', edge: '#281008', crater: '#080402', glow: '#ff2244', pts: 9 }
];

function buildMeteorShape(pts, radius) {
    const vertices = [];
    for (let i = 0; i < pts; i++) {
        const angle = (i / pts) * Math.PI * 2;
        const r = radius * (0.72 + Math.random() * 0.38);
        vertices.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
    }
    return vertices;
}

function traceMeteorPath(c, verts, scale) {
    c.beginPath();
    verts.forEach((v, i) => {
        if (i === 0) c.moveTo(v.x * scale, v.y * scale);
        else c.lineTo(v.x * scale, v.y * scale);
    });
    c.closePath();
}

function buildMeteorSprites(m) {
    const pad = Math.ceil(m.radius * 0.35);
    const cx = m.radius + pad;
    const sz = cx * 2;

    m.glowCanvas = document.createElement('canvas');
    m.glowCanvas.width = m.glowCanvas.height = sz;
    const gc = m.glowCanvas.getContext('2d');
    gc.translate(cx, cx);
    traceMeteorPath(gc, m.vertices, 1.18);
    gc.fillStyle = m.type.glow;
    gc.globalAlpha = 0.4;
    gc.fill();

    m.coreCanvas = document.createElement('canvas');
    m.coreCanvas.width = m.coreCanvas.height = sz;
    const cc = m.coreCanvas.getContext('2d');
    cc.translate(cx, cx);
    traceMeteorPath(cc, m.vertices, 1);
    cc.fillStyle = m.type.fill;
    cc.fill();
    cc.strokeStyle = m.type.glow;
    cc.lineWidth = 2;
    cc.stroke();
    m.craters.forEach(cr => {
        cc.beginPath();
        cc.arc(cr.ox, cr.oy, cr.r, 0, Math.PI * 2);
        cc.fillStyle = m.type.crater;
        cc.fill();
    });
    cc.globalAlpha = 0.35;
    cc.strokeStyle = m.type.glow;
    cc.lineWidth = 1;
    cc.beginPath();
    cc.moveTo(m.vertices[0].x * 0.3, m.vertices[0].y * 0.3);
    const mid = m.vertices[Math.floor(m.vertices.length / 2)];
    cc.lineTo(mid.x * 0.5, mid.y * 0.5);
    cc.stroke();

    m.spriteSize = sz;
    m.spriteHalf = cx;
}

class Player {
    constructor() {
        this.width = 44; this.height = 48;
        this.x = canvas.width / 2; this.y = canvas.height - 90;
        this.targetX = this.x; this.targetY = this.y;
        this.speed = 0.22;
        this.maxHp = 200; this.hp = 200;
        this.shootCooldown = 0;
        this.shootInterval = 130;
        this.gunLevel = 1;
        this.enginePhase = 0;
    }

    update(deltaTime) {
        this.x += (this.targetX - this.x) * this.speed;
        this.y += (this.targetY - this.y) * this.speed;
        this.x = Math.max(this.width / 2, Math.min(canvas.width - this.width / 2, this.x));
        this.y = Math.max(this.height / 2, Math.min(canvas.height - this.height / 2, this.y));
        this.enginePhase += deltaTime * 0.012;

        const newGun = gunLevelFromScore(score);
        if (newGun > this.gunLevel) {
            this.gunLevel = newGun;
            showToast('WEAPON ×' + this.gunLevel);
            this.shootInterval = Math.max(75, 130 - (this.gunLevel - 1) * 15);
        }

        if (this.shootCooldown <= 0) {
            const offsets = gunOffsets(this.gunLevel);
            offsets.forEach(ox => {
                if (bullets.length < MAX_BULLETS) {
                    bullets.push(new Bullet(this.x + ox, this.y - this.height / 2 + 4, -11, true));
                }
            });
            const now = performance.now();
            if (now - lastLaserSound > 70) {
                playSound('laser');
                lastLaserSound = now;
            }
            this.shootCooldown = this.shootInterval;
        } else {
            this.shootCooldown -= deltaTime;
        }
    }

    draw() {
        const x = this.x, y = this.y;
        const fh = 12 + Math.sin(this.enginePhase) * 5;
        const heavy = entityLoad() > 50;

        // Soft glow (no shadowBlur)
        if (!heavy) {
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.moveTo(x, y - this.height / 2 - 4);
            ctx.lineTo(x - this.width / 2 - 6, y + this.height / 2 + 4);
            ctx.lineTo(x + this.width / 2 + 6, y + this.height / 2 + 4);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        ctx.fillStyle = '#ff0077';
        ctx.fillRect(x - 10, y + this.height / 2, 4, 6 + fh * 0.3);
        ctx.fillRect(x + 6, y + this.height / 2, 4, 6 + fh * 0.3);
        ctx.beginPath();
        ctx.moveTo(x - 5, y + this.height / 2 - 2);
        ctx.lineTo(x, y + this.height / 2 + fh);
        ctx.lineTo(x + 5, y + this.height / 2 - 2);
        ctx.fill();

        ctx.fillStyle = '#00ffcc';
        ctx.beginPath();
        ctx.moveTo(x, y - this.height / 2);
        ctx.lineTo(x - this.width / 2, y + this.height / 2);
        ctx.lineTo(x, y + this.height / 4);
        ctx.lineTo(x + this.width / 2, y + this.height / 2);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = 'rgba(5,5,10,0.7)';
        ctx.beginPath();
        ctx.moveTo(x, y - this.height / 4);
        ctx.lineTo(x - this.width / 3, y + this.height / 3);
        ctx.lineTo(x, y + this.height / 6);
        ctx.lineTo(x + this.width / 3, y + this.height / 3);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ff0077';
        gunOffsets(this.gunLevel).forEach(ox => {
            ctx.fillRect(x + ox - 2, y - this.height / 2 + 2, 4, 12);
        });
    }
}

class Bullet {
    constructor(x, y, vy, isPlayer) {
        this.x = x; this.y = y; this.vy = vy;
        this.isPlayer = isPlayer;
        this.radius = isPlayer ? 3 : 4;
        this.trail = [];
    }
    update() {
        if (this.isPlayer && entityLoad() < 60) {
            this.trail.push({ x: this.x, y: this.y });
            const maxTrail = entityLoad() > 40 ? 2 : 4;
            if (this.trail.length > maxTrail) this.trail.shift();
        }
        this.y += this.vy;
    }
    draw() {
        if (this.isPlayer) {
            this.trail.forEach((t, i) => {
                ctx.globalAlpha = (i + 1) / (this.trail.length + 1) * 0.35;
                ctx.fillStyle = '#ff0077';
                ctx.fillRect(t.x - 1, t.y - 4, 2, 8);
            });
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#ff0077';
            ctx.fillRect(this.x - 2, this.y - 10, 4, 16);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(this.x - 1, this.y - 8, 2, 12);
        } else {
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

class Meteor {
    constructor() {
        const type = METEOR_TYPES[Math.floor(Math.random() * Math.min(METEOR_TYPES.length, 2 + stage))];
        this.type = type;
        this.radius = Math.random() * 14 + 14 + stage * 1.2;
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = -this.radius - Math.random() * 40;
        this.vertices = buildMeteorShape(type.pts, this.radius);
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.025;
        this.maxHp = Math.ceil((Math.random() * 2 + 1) * (1 + stage * 0.35));
        this.hp = this.maxHp;
        this.speed = (Math.random() * 1.2 + 0.8) * (1 + stage * 0.12);
        this.shootInterval = Math.random() * 2200 + 1800 - stage * 80;
        this.shootCooldown = this.shootInterval * Math.random();
        this.glowPhase = Math.random() * Math.PI * 2;
        this.craters = [];
        const nc = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < nc; i++) {
            this.craters.push({
                ox: (Math.random() - 0.5) * this.radius * 1.1,
                oy: (Math.random() - 0.5) * this.radius * 1.1,
                r: this.radius * (0.12 + Math.random() * 0.18)
            });
        }
        buildMeteorSprites(this);
    }

    update(deltaTime) {
        this.y += this.speed;
        this.rotation += this.rotSpeed;
        this.glowPhase += deltaTime * 0.004;
        if (stage >= 3 && bullets.length < MAX_BULLETS) {
            if (this.shootCooldown <= 0) {
                bullets.push(new Bullet(this.x, this.y + this.radius * 0.5, 3.5 + stage * 0.15, false));
                this.shootCooldown = this.shootInterval;
            } else {
                this.shootCooldown -= deltaTime;
            }
        }
    }

    draw() {
        const pulse = 0.8 + Math.sin(this.glowPhase) * 0.2;
        const half = this.spriteHalf;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = pulse;
        ctx.drawImage(this.glowCanvas, -half, -half);
        ctx.globalAlpha = 1;
        ctx.drawImage(this.coreCanvas, -half, -half);
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color, size, glow) {
        this.x = x; this.y = y; this.color = color; this.glow = glow || color;
        this.vx = (Math.random() - 0.5) * 7;
        this.vy = (Math.random() - 0.5) * 7;
        this.alpha = 1;
        this.decay = Math.random() * 0.025 + 0.015;
        this.size = size || (Math.random() * 4 + 2);
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; this.vx *= 0.98; this.vy *= 0.98; }
    draw() {
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

let player, bullets = [], meteors = [], particles = [];
let enemySpawnTimer = 0, enemySpawnInterval = 1400;

function handleInput(e) {
    if (gameState !== 'PLAYING') return;
    const rect = canvas.getBoundingClientRect();
    let cx, cy;
    if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
    else { cx = e.clientX; cy = e.clientY; }
    player.targetX = (cx - rect.left) * (canvas.width / rect.width);
    player.targetY = (cy - rect.top) * (canvas.height / rect.height) - 40;
}
window.addEventListener('mousemove', handleInput);
window.addEventListener('touchmove', handleInput, { passive: false });
window.addEventListener('touchstart', handleInput, { passive: false });

function spawnExplosion(x, y, colors, glows, count) {
    playSound('explosion');
    const load = entityLoad();
    const capped = load > 55 ? Math.min(count, 10) : (load > 35 ? Math.min(count, 14) : count);
    const n = Math.min(capped, MAX_PARTICLES - particles.length);
    for (let i = 0; i < n; i++) {
        const ci = i % colors.length;
        particles.push(new Particle(x, y, colors[ci], Math.random() * 5 + 2, glows ? glows[ci] : colors[ci]));
    }
}

function drawBackground() {
    bgScroll += 0.8 + stage * 0.05;

    if (bgLayer) ctx.drawImage(bgLayer, 0, 0);

    ctx.strokeStyle = 'rgba(0,255,204,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += 40) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
    }
    const gridOff = bgScroll % 40;
    for (let y = -gridOff; y <= canvas.height; y += 40) {
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();

    stars.forEach(s => {
        s.y += s.spd * (1 + stage * 0.05);
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
        ctx.globalAlpha = s.a;
        ctx.fillStyle = s.color;
        ctx.fillRect(s.x, s.y, s.r, s.r);
        ctx.globalAlpha = 1;
    });
}

function checkCollision(a, b, type) {
    if (type === 'circle-circle') {
        const dx = a.x - b.x, dy = a.y - b.y;
        const r = a.radius + b.radius;
        return dx * dx + dy * dy < r * r;
    }
    const dx = b.x - Math.max(a.x - a.width / 2, Math.min(b.x, a.x + a.width / 2));
    const dy = b.y - Math.max(a.y - a.height / 2, Math.min(b.y, a.y + a.height / 2));
    return dx * dx + dy * dy < b.radius * b.radius;
}

function updateStage() {
    const target = 1 + Math.floor(score / STAGE_SCORE_BASE);
    if (target > stage) {
        stage = target;
        showToast('STAGE ' + stage);
    }
}

function startGame(infinityMode) {
    lastInfinityMode = !!infinityMode;
    godMode = lastInfinityMode;
    score = 0; stage = 1;
    enemySpawnInterval = 1400;
    lastLaserSound = 0;
    player = new Player();
    player.maxHp = godMode ? player.maxHp : NORMAL_MAX_HP;
    player.hp = player.maxHp;
    bullets = []; meteors = []; particles = [];
    rebuildBgLayer();
    gameState = 'PLAYING';
    mainMenu.classList.add('hidden');
    gameOverMenu.classList.add('hidden');
    upgradeToast.classList.remove('show');
    hitAlert.classList.remove('on');
    gameContainer.classList.remove('hit');
    damageToast.classList.remove('show');
    hitAlertTimer = 0;
    damageToastTimer = 0;
    hpDisplay.textContent = godMode ? '∞' : String(player.hp);
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameState = 'GAMEOVER';
    finalScore.textContent = 'SCORE: ' + score + '  ·  STAGE ' + stage + '  ·  GUNS ×' + player.gunLevel;
    gameOverMenu.classList.remove('hidden');
}

function gameLoop(timestamp) {
    if (gameState !== 'PLAYING') return;
    let deltaTime = timestamp - lastTime;
    if (deltaTime > 100) deltaTime = 16.66;
    lastTime = timestamp;

    if (toastTimer > 0) { toastTimer--; if (toastTimer <= 0) upgradeToast.classList.remove('show'); }
    if (damageToastTimer > 0) { damageToastTimer--; if (damageToastTimer <= 0) damageToast.classList.remove('show'); }
    if (hitAlertTimer > 0) {
        hitAlertTimer--;
        if (hitAlertTimer <= 0) {
            hitAlert.classList.remove('on');
            gameContainer.classList.remove('hit');
        }
    }

    drawBackground();
    player.update(deltaTime);
    player.draw();

    enemySpawnTimer += deltaTime;
    const spawnRate = Math.max(380, enemySpawnInterval - stage * 55 - player.gunLevel * 20);
    if (enemySpawnTimer >= spawnRate && meteors.length < MAX_METEORS) {
        meteors.push(new Meteor());
        const doubleChance = Math.min(0.45, 0.25 + stage * 0.05);
        if (stage >= 2 && meteors.length < MAX_METEORS && Math.random() < doubleChance) {
            meteors.push(new Meteor());
        }
        enemySpawnTimer = 0;
    }

    trimArrays();

    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].update();
        bullets[i].draw();
        if (bullets[i].y < -20 || bullets[i].y > canvas.height + 20) bullets.splice(i, 1);
    }

    for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        m.update(deltaTime);
        m.draw();

        if (m.y > canvas.height + m.radius) {
            meteors.splice(i, 1);
            damagePlayer(METEOR_LEAK_DAMAGE, false);
            continue;
        }

        if (checkCollision(player, m, 'rect-circle')) {
            spawnExplosion(m.x, m.y, [m.type.fill, m.type.glow, '#ff0077'], [m.type.glow, m.type.glow, '#ff0077'], 14);
            damagePlayer(Math.floor(m.radius * 0.8), false);
            meteors.splice(i, 1);
            continue;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.abs(b.y - m.y) > m.radius + 24) continue;
            if (b.isPlayer && checkCollision(b, m, 'circle-circle')) {
                m.hp--;
                bullets.splice(j, 1);
                particles.push(new Particle(b.x, b.y, '#ff0077', 3, '#ff0077'));
                trimArrays();
                if (m.hp <= 0) {
                    spawnExplosion(m.x, m.y, [m.type.fill, m.type.glow, '#00ffcc', '#ff0077'], [m.type.glow, m.type.glow, '#00ffcc', '#ff0077'], 18);
                    score += m.maxHp * 15 + Math.floor(m.radius);
                    updateStage();
                    meteors.splice(i, 1);
                }
                break;
            } else if (!b.isPlayer && checkCollision(b, player, 'circle-circle')) {
                const shotDmg = ENEMY_SHOT_DAMAGE + Math.min(8, Math.floor(stage * 0.4));
                damagePlayer(shotDmg, true);
                bullets.splice(j, 1);
            }
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }

    if (hitAlertTimer > 0) {
        ctx.fillStyle = 'rgba(255,0,50,' + (0.22 * hitAlertTimer / 50) + ')';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    scoreDisplay.textContent = score;
    stageDisplay.textContent = stage;
    gunDisplay.textContent = '×' + player.gunLevel;
    if (godMode) player.hp = player.maxHp;
    hpDisplay.textContent = godMode ? '∞' : Math.max(0, Math.floor(player.hp));

    if (!godMode && player.hp <= 0) {
        spawnExplosion(player.x, player.y, ['#00ffcc', '#ff0077', '#ffffff'], ['#00ffcc', '#ff0077', '#ffffff'], 40);
        gameOver();
        return;
    }

    requestAnimationFrame(gameLoop);
}

document.getElementById('startInfBtn').addEventListener('click', function(){ startGame(true); });
document.getElementById('startNormBtn').addEventListener('click', function(){ startGame(false); });
document.getElementById('restartBtn').addEventListener('click', function(){ startGame(lastInfinityMode); });
</script>
</body>
