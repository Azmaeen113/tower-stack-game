<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Number Rush</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080510;
  --s1: #0f0c1a;
  --s2: #16122a;
  --border: #2a2048;
  --purple: #bf5af2;
  --pink: #ff375f;
  --orange: #ff9f0a;
  --teal: #30d158;
  --blue: #0a84ff;
  --text: #e8e0ff;
  --muted: #6045a0;
  --fire: #ff6200;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'JetBrains Mono', monospace; user-select:none; }

/* Particles BG */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse at 50% 0%, rgba(191,90,242,0.07) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 100%, rgba(255,55,95,0.05) 0%, transparent 50%);
}
canvas#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.4; }

.screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; z-index:1; transition:opacity 0.3s, transform 0.3s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(0.96); }

/* ── MENU ── */
.neon-title { font-family:'Exo 2', sans-serif; font-size:68px; font-weight:900; line-height:0.85; text-align:center; }
.nt-1 { display:block; background:linear-gradient(135deg,#bf5af2,#ff375f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:3px; }
.nt-2 { display:block; background:linear-gradient(135deg,#ff9f0a,#ff375f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:8px; font-size:52px; }
.tagline { font-size:10px; letter-spacing:5px; color:var(--muted); margin:12px 0 44px; }
.trophy-row { display:flex; gap:10px; width:100%; max-width:340px; margin-bottom:36px; }
.tcard { flex:1; background:var(--s1); border:1px solid var(--border); border-radius:14px; padding:12px 8px; text-align:center; }
.tc-lbl { font-size:8px; letter-spacing:3px; color:var(--muted); display:block; margin-bottom:4px; }
.tc-val { font-family:'Exo 2', sans-serif; font-size:24px; font-weight:900; color:var(--purple); }
.start-btn {
  width:100%; max-width:340px; padding:20px; border-radius:16px; border:none;
  background:linear-gradient(135deg,#bf5af2 0%,#ff375f 60%,#ff9f0a 100%);
  font-family:'Exo 2', sans-serif; font-size:22px; font-weight:900;
  letter-spacing:4px; color:#fff; cursor:pointer;
  box-shadow:0 0 40px rgba(191,90,242,0.35);
  transition:transform 0.1s;
}
.start-btn:active { transform:scale(0.97); }

/* ── GAME ── */
#game { justify-content:flex-start; padding:0; }
.g-header {
  width:100%; padding:16px 20px 12px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid rgba(42,32,72,0.8);
}
.gh-level { font-family:'Exo 2',sans-serif; font-size:13px; font-weight:900; letter-spacing:3px; }
.gh-score { font-family:'Exo 2',sans-serif; font-size:32px; font-weight:900; color:var(--purple); line-height:1; }
.gh-score-lbl { font-size:8px; letter-spacing:3px; color:var(--muted); display:block; }

/* combo fire */
.fire-meter { width:100%; padding:10px 20px 8px; }
.fire-label { display:flex; justify-content:space-between; margin-bottom:5px; }
.fl-text { font-size:9px; letter-spacing:3px; color:var(--muted); }
.fl-combo { font-family:'Exo 2',sans-serif; font-size:13px; font-weight:900; color:var(--orange); }
.fire-track { width:100%; height:8px; background:rgba(42,32,72,0.8); border-radius:4px; overflow:hidden; }
.fire-fill { height:8px; border-radius:4px; transition:width 0.2s; }

/* question timer */
.q-timer-outer { width:100%; padding:6px 20px 12px; }
.q-timer-track { width:100%; height:5px; background:rgba(42,32,72,0.8); border-radius:3px; position:relative; overflow:hidden; }
.q-timer-fill { height:5px; border-radius:3px; }
.q-timer-glow { position:absolute; top:0; right:0; width:10px; height:5px; background:#fff; filter:blur(3px); border-radius:3px; pointer-events:none; }

/* boss banner */
.boss-banner {
  width:calc(100% - 40px); margin:0 20px 12px; padding:10px 16px; border-radius:12px;
  background:linear-gradient(135deg,rgba(255,55,95,0.15),rgba(255,159,10,0.1));
  border:1px solid rgba(255,55,95,0.3); text-align:center;
  font-family:'Exo 2',sans-serif; font-size:12px; font-weight:900;
  letter-spacing:3px; color:var(--pink);
  opacity:0; transition:opacity 0.3s;
}
.boss-banner.show { opacity:1; }

.q-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4px 20px 0; width:100%; }

.q-difficulty { font-size:9px; letter-spacing:4px; color:var(--muted); margin-bottom:10px; }

.q-box {
  width:100%; background:var(--s1); border:1px solid var(--border);
  border-radius:22px; padding:26px 20px 20px; text-align:center; margin-bottom:20px;
  position:relative;
}
.q-box.boss-mode { border-color:rgba(255,55,95,0.4); box-shadow:0 0 20px rgba(255,55,95,0.1); }
.q-formula { font-family:'Exo 2',sans-serif; font-size:clamp(30px,9vw,50px); font-weight:900; color:var(--text); letter-spacing:2px; line-height:1.2; }
.q-solve { font-size:11px; color:var(--muted); margin-top:8px; letter-spacing:2px; }

/* answer choices */
.choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.choice-btn {
  padding:18px 12px; border-radius:16px; border:1px solid var(--border);
  background:var(--s1); font-family:'Exo 2',sans-serif; font-size:22px; font-weight:900;
  color:var(--text); cursor:pointer; text-align:center;
  transition:all 0.12s; position:relative; overflow:hidden;
}
.choice-btn::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 50%, rgba(191,90,242,0.1), transparent); opacity:0; transition:opacity 0.15s; }
.choice-btn:active::before { opacity:1; }
.choice-btn:active { transform:scale(0.96); }
.choice-btn.correct { background:rgba(48,209,88,0.12); border-color:var(--teal); color:var(--teal); animation:choice-glow-green 0.5s ease; }
.choice-btn.wrong { background:rgba(255,55,95,0.1); border-color:var(--pink); color:var(--pink); }
.choice-btn.reveal { background:rgba(48,209,88,0.08); border-color:rgba(48,209,88,0.3); color:rgba(48,209,88,0.6); }
.choice-btn.disabled { pointer-events:none; }
@keyframes choice-glow-green { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 20px rgba(48,209,88,0.3)} }

/* progress dots */
.progress-dots { display:flex; gap:5px; margin:0 20px 10px; justify-content:center; flex-wrap:wrap; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:all 0.2s; }
.dot.done { background:var(--purple); box-shadow:0 0 6px var(--purple); }
.dot.correct-d { background:var(--teal); }
.dot.wrong-d { background:var(--pink); }
.dot.boss { background:var(--orange); border-radius:2px; }

/* result */
#result { z-index:1; }
.r-title { font-family:'Exo 2',sans-serif; font-size:52px; font-weight:900; text-align:center; line-height:1; }
.r-title span.good { background:linear-gradient(135deg,#bf5af2,#0a84ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.r-title span.bad { background:linear-gradient(135deg,#ff375f,#ff9f0a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.r-sub { font-size:10px; letter-spacing:5px; color:var(--muted); margin:8px 0 28px; }
.r-score-big { font-family:'Exo 2',sans-serif; font-size:88px; font-weight:900; color:var(--purple); text-shadow:0 0 30px rgba(191,90,242,0.4); line-height:1; }
.r-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:340px; margin:20px 0 28px; }
.rg { background:var(--s1); border:1px solid var(--border); border-radius:12px; padding:12px 8px; text-align:center; }
.rg-l { font-size:8px; letter-spacing:2px; color:var(--muted); display:block; margin-bottom:3px; }
.rg-v { font-family:'Exo 2',sans-serif; font-size:22px; font-weight:900; }
.r-btns { display:flex; gap:10px; width:100%; max-width:340px; }
.r-btn { flex:1; padding:16px; border-radius:12px; font-family:'Exo 2',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; cursor:pointer; border:1px solid var(--border); background:var(--s1); color:var(--text); }
.r-btn.p { background:linear-gradient(135deg,#bf5af2,#ff375f); color:#fff; border:none; box-shadow:0 0 25px rgba(191,90,242,0.25); }
.r-btn:active { transform:scale(0.96); }

/* float anim */
@keyframes zap { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(0.8)} }
.zap { position:fixed; font-family:'Exo 2',sans-serif; font-size:30px; font-weight:900; pointer-events:none; z-index:200; animation:zap 0.7s ease-out forwards; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="neon-title">
    <span class="nt-1">NUMBER</span>
    <span class="nt-2">RUSH</span>
  </div>
  <div class="tagline">PICK THE RIGHT ANSWER · FAST</div>
  <div class="trophy-row">
    <div class="tcard"><span class="tc-lbl">HIGH SCORE</span><span class="tc-val" id="mHS">0</span></div>
    <div class="tcard"><span class="tc-lbl">MAX LEVEL</span><span class="tc-val" id="mML">0</span></div>
    <div class="tcard"><span class="tc-lbl">GAMES</span><span class="tc-val" id="mG">0</span></div>
  </div>
  <button class="start-btn" id="startBtn">RUSH</button>
</div>

<!-- GAME -->
<div class="screen hidden" id="game">
  <div class="g-header">
    <div>
      <span class="gh-score-lbl" id="ghLevelLabel">LEVEL 1</span>
      <div class="gh-level" id="ghLevel" style="color:var(--purple)">EASY</div>
    </div>
    <div style="text-align:right">
      <span class="gh-score-lbl">SCORE</span>
      <div class="gh-score" id="ghScore">0</div>
    </div>
  </div>

  <div class="fire-meter">
    <div class="fire-label">
      <span class="fl-text">COMBO FIRE</span>
      <span class="fl-combo" id="comboLabel">0x</span>
    </div>
    <div class="fire-track"><div class="fire-fill" id="fireFill" style="width:0%"></div></div>
  </div>

  <div class="q-timer-outer">
    <div class="q-timer-track">
      <div class="q-timer-fill" id="qFill"></div>
      <div class="q-timer-glow" id="qGlow"></div>
    </div>
  </div>

  <div class="boss-banner" id="bossBanner">⚡ BOSS ROUND — HARD MODE ⚡</div>

  <div class="progress-dots" id="progressDots"></div>

  <div class="q-area">
    <div class="q-difficulty" id="qDiff">LEVEL 1 — EASY</div>
    <div class="q-box" id="qBox">
      <div class="q-formula" id="qFormula">5 + 3</div>
      <div class="q-solve">= ?</div>
    </div>
    <div class="choices" id="choices">
      <button class="choice-btn" data-i="0">8</button>
      <button class="choice-btn" data-i="1">6</button>
      <button class="choice-btn" data-i="2">9</button>
      <button class="choice-btn" data-i="3">7</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result">
  <div class="r-title" id="rTitle"><span class="good">LEVEL<br>CLEARED</span></div>
  <div class="r-sub" id="rSub">ROUND COMPLETE</div>
  <div class="r-score-big" id="rScore">0</div>
  <div class="r-grid">
    <div class="rg"><span class="rg-l">CORRECT</span><span class="rg-v" style="color:var(--teal)" id="rC">0</span></div>
    <div class="rg"><span class="rg-l">WRONG</span><span class="rg-v" style="color:var(--pink)" id="rW">0</span></div>
    <div class="rg"><span class="rg-l">MAX COMBO</span><span class="rg-v" style="color:var(--orange)" id="rMC">0</span></div>
    <div class="rg"><span class="rg-l">LEVEL</span><span class="rg-v" style="color:var(--purple)" id="rL">1</span></div>
  </div>
  <div class="r-btns">
    <button class="r-btn" id="menuBtn">MENU</button>
    <button class="r-btn p" id="continueBtn">CONTINUE</button>
  </div>
</div>

<script>
// ── BG CANVAS ──
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const pts=Array.from({length:40},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.5,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,alpha:Math.random()*0.5+0.1,col:['#bf5af2','#ff375f','#0a84ff','#ff9f0a'][Math.floor(Math.random()*4)]}));
  function drawBG(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    requestAnimationFrame(drawBG);
  }
  drawBG();
})();

// ── DB ──
const DB={get:k=>JSON.parse(localStorage.getItem(k)||'null'),set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
let rec=DB.get('nr_rec')||{hs:0,ml:0,games:0};
function saveRec(){DB.set('nr_rec',rec);}
function updateMenu(){document.getElementById('mHS').textContent=rec.hs;document.getElementById('mML').textContent=rec.ml;document.getElementById('mG').textContent=rec.games;}
updateMenu();

// ── STATE ──
let level,score,combo,maxCombo,correct,wrong;
let qAns, qTimer, qTimerInterval;
let questionsInLevel=10, questionIdx=0;
let gameActive=false;
let dots=[];

function r(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

// ── LEVEL CONFIG ──
function lvlConfig(l){
  if(l<=3) return{diff:'EASY',time:8,boss:false,label:'EASY'};
  if(l<=6) return{diff:'MEDIUM',time:7,boss:false,label:'MEDIUM'};
  if(l<=9) return{diff:'HARD',time:6,boss:false,label:'HARD'};
  if(l<=12) return{diff:'EXPERT',time:5,boss:l%3===0,label:'EXPERT'};
  return{diff:'INSANE',time:4,boss:l%2===0,label:'INSANE'};
}

function genQ(diff){
  let q,ans;
  switch(diff){
    case 'EASY':{
      const t=r(0,2);
      if(t===0){const a=r(2,20),b=r(2,20);q=`${a} + ${b}`;ans=a+b;}
      else if(t===1){const a=r(10,35),b=r(2,a-1);q=`${a} − ${b}`;ans=a-b;}
      else{const a=r(2,9),b=r(2,9);q=`${a} × ${b}`;ans=a*b;}
      break;}
    case 'MEDIUM':{
      const t=r(0,3);
      if(t===0){const a=r(20,99),b=r(20,99);q=`${a} + ${b}`;ans=a+b;}
      else if(t===1){const a=r(20,99),b=r(5,a-1);q=`${a} − ${b}`;ans=a-b;}
      else if(t===2){const a=r(6,15),b=r(6,15);q=`${a} × ${b}`;ans=a*b;}
      else{const b=r(2,12),a2=r(2,12);q=`${b*a2} ÷ ${b}`;ans=a2;}
      break;}
    case 'HARD':{
      const t=r(0,4);
      if(t===0){const a=r(12,25),b=r(12,25);q=`${a} × ${b}`;ans=a*b;}
      else if(t===1){const a=r(2,9);q=`${a}²`;ans=a*a;}
      else if(t===2){const a=r(3,9),b=r(2,9),c=r(2,9);q=`${a}×${b}+${c}`;ans=a*b+c;}
      else if(t===3){const a=r(100,400),b=r(50,200);q=`${a}+${b}`;ans=a+b;}
      else{const a=r(100,400),b=r(10,99);q=`${a}−${b}`;ans=a-b;}
      break;}
    case 'EXPERT':{
      const t=r(0,4);
      if(t===0){const a=r(15,35),b=r(15,35);q=`${a}×${b}`;ans=a*b;}
      else if(t===1){const a=r(2,6);q=`${a}³`;ans=a*a*a;}
      else if(t===2){const a=r(3,8),b=r(2,5),c=r(3,8),d=r(2,5);q=`${a}×${b}+${c}×${d}`;ans=a*b+c*d;}
      else if(t===3){const a=r(50,150),b=r(3,9);q=`${a}×${b}`;ans=a*b;}
      else{const a=r(10,20),b=r(5,15);q=`${a}²−${b}²`;ans=a*a-b*b;}
      break;}
    case 'INSANE':{
      const t=r(0,3);
      if(t===0){const a=r(20,50),b=r(20,45);q=`${a}×${b}`;ans=a*b;}
      else if(t===1){const a=r(2,8),b=r(2,5),c=r(2,8),d=r(2,5);q=`(${a}+${b})×(${c}+${d})`;ans=(a+b)*(c+d);}
      else if(t===2){const a=r(3,12);q=`${a}³`;ans=a*a*a;}
      else{const a=r(15,30),b=r(10,25);q=`${a}²+${b}²`;ans=a*a+b*b;}
      break;}
  }
  return{q,ans};
}

function makeChoices(correct){
  const choices=new Set([correct]);
  const range=Math.max(10,Math.floor(Math.abs(correct)*0.3)+5);
  while(choices.size<4){
    const offset=r(-range,range);
    if(offset!==0) choices.add(correct+offset);
  }
  return shuffle([...choices]);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=r(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── SCREENS ──
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id));}

// ── DOTS ──
function buildDots(){
  const wrap=document.getElementById('progressDots');
  wrap.innerHTML='';
  dots=[];
  for(let i=0;i<questionsInLevel;i++){
    const d=document.createElement('div');
    d.className='dot'+(lvlConfig(level).boss&&i===questionsInLevel-1?' boss':'');
    wrap.appendChild(d);
    dots.push(d);
  }
}
function markDot(i,state){
  if(dots[i]){ dots[i].className='dot done '+state+(lvlConfig(level).boss&&i===questionsInLevel-1?' boss':''); }
}

// ── GAME ──
function startGame(){
  level=1; score=0; combo=0; maxCombo=0; correct=0; wrong=0;
  gameActive=true;
  show('game');
  startLevel();
}

function startLevel(){
  questionIdx=0;
  buildDots();
  const cfg=lvlConfig(level);
  document.getElementById('ghLevelLabel').textContent=`LEVEL ${level}`;
  document.getElementById('ghLevel').textContent=cfg.label;
  const isBoss=cfg.boss;
  document.getElementById('bossBanner').classList.toggle('show',isBoss);
  document.getElementById('qBox').classList.toggle('boss-mode',isBoss);
  nextQ();
}

let currentChoicesArr;
function nextQ(){
  clearInterval(qTimerInterval);
  const cfg=lvlConfig(level);
  const {q,ans}=genQ(cfg.diff);
  qAns=ans;
  currentChoicesArr=makeChoices(ans);

  document.getElementById('qFormula').textContent=q;
  document.getElementById('qDiff').textContent=`LEVEL ${level} — ${cfg.label}`;

  // render choices
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach((btn,i)=>{
    btn.textContent=currentChoicesArr[i];
    btn.className='choice-btn';
    btn.onclick=()=>onChoice(i);
  });

  startQTimer(cfg.time);
  updateFireMeter();
}

function startQTimer(secs){
  let elapsed=0;
  const total=secs*10;
  const fill=document.getElementById('qFill');
  const glow=document.getElementById('qGlow');
  fill.style.transition='none'; fill.style.width='100%';
  qTimerInterval=setInterval(()=>{
    elapsed++;
    const pct=Math.max(0,100-(elapsed/total*100));
    fill.style.width=pct+'%';
    const hue=pct>50?120:pct>25?50:0;
    fill.style.background=`hsl(${hue},90%,55%)`;
    glow.style.right=(100-pct)+'%';
    if(elapsed>=total){ clearInterval(qTimerInterval); onTimeout(); }
  },100);
}

function onChoice(i){
  clearInterval(qTimerInterval);
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.classList.add('disabled'));
  const userAns=currentChoicesArr[i];
  if(userAns===qAns){
    btns[i].classList.add('correct');
    correct++;
    combo++;
    if(combo>maxCombo)maxCombo=combo;
    const mult=combo>=8?4:combo>=5?3:combo>=3?2:1;
    const base=lvlConfig(level).diff==='INSANE'?50:lvlConfig(level).diff==='EXPERT'?40:lvlConfig(level).diff==='HARD'?30:lvlConfig(level).diff==='MEDIUM'?20:10;
    const pts=base*mult;
    score+=pts;
    document.getElementById('ghScore').textContent=score;
    zap('+'+pts, '#30d158', combo>=3?`×${combo}`:'');
    markDot(questionIdx,'correct-d');
  } else {
    btns[i].classList.add('wrong');
    // reveal correct
    btns.forEach((b,j)=>{ if(currentChoicesArr[j]===qAns)b.classList.add('reveal'); });
    combo=0;
    wrong++;
    zap('✗','#ff375f');
    markDot(questionIdx,'wrong-d');
  }
  updateFireMeter();
  questionIdx++;
  document.getElementById('ghScore').textContent=score;
  if(questionIdx>=questionsInLevel){
    setTimeout(()=>endLevel(),600);
  } else {
    setTimeout(nextQ,500);
  }
}

function onTimeout(){
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach((b,j)=>{ b.classList.add('disabled'); if(currentChoicesArr[j]===qAns)b.classList.add('reveal'); });
  combo=0; wrong++;
  updateFireMeter();
  zap('TIME','#ff9f0a');
  markDot(questionIdx,'wrong-d');
  questionIdx++;
  if(questionIdx>=questionsInLevel){ setTimeout(()=>endLevel(),500); }
  else setTimeout(nextQ,500);
}

function updateFireMeter(){
  const fill=document.getElementById('fireFill');
  const pct=Math.min(100,combo*12.5);
  fill.style.width=pct+'%';
  const color=combo>=8?'linear-gradient(90deg,#ff6200,#ff375f,#ff9f0a)':combo>=5?'linear-gradient(90deg,#ff9f0a,#ff6200)':combo>=3?'linear-gradient(90deg,#bf5af2,#ff9f0a)':'linear-gradient(90deg,#0a84ff,#bf5af2)';
  fill.style.background=color;
  document.getElementById('comboLabel').textContent=combo+'x';
  document.getElementById('comboLabel').style.color=combo>=8?'#ff6200':combo>=5?'#ff9f0a':combo>=3?'#bf5af2':'var(--muted)';
}

function endLevel(){
  clearInterval(qTimerInterval);
  gameActive=false;
  const cfg=lvlConfig(level);
  if(score>rec.hs)rec.hs=score;
  if(level>rec.ml)rec.ml=level;
  rec.games++;
  saveRec(); updateMenu();
  document.getElementById('rScore').textContent=score;
  document.getElementById('rC').textContent=correct;
  document.getElementById('rW').textContent=wrong;
  document.getElementById('rMC').textContent=maxCombo;
  document.getElementById('rL').textContent=level;
  const pct=correct/questionsInLevel;
  const isGood=pct>=0.6;
  document.getElementById('rTitle').innerHTML=`<span class="${isGood?'good':'bad'}">${isGood?'LEVEL<br>CLEARED':'NICE<br>TRY'}</span>`;
  document.getElementById('rSub').textContent=pct===1?'FLAWLESS ROUND!':pct>=0.8?'GREAT ROUND':pct>=0.6?'LEVEL PASSED':'PLAY AGAIN TO ADVANCE';
  document.getElementById('continueBtn').textContent=isGood?'NEXT LEVEL':'RETRY';
  show('result');
}

function continueGame(){
  const pct=correct/questionsInLevel;
  if(pct>=0.6) level++;
  correct=0; wrong=0; combo=0; maxCombo=0;
  gameActive=true;
  show('game');
  startLevel();
}

function zap(text,color,extra=''){
  const el=document.createElement('div');
  el.className='zap';
  el.textContent=text+(extra?' '+extra:'');
  el.style.color=color;
  el.style.textShadow=`0 0 12px ${color}`;
  el.style.left=r(15,70)+'%';
  el.style.top='38%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),750);
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('continueBtn').addEventListener('click',continueGame);
document.getElementById('menuBtn').addEventListener('click',()=>{
  clearInterval(qTimerInterval);
  if(window.parent!==window){ window.parent.postMessage({type:'VVQ_GAME_SCORE',score:score},'*'); }
  show('menu');
});
</script>
</body>
</html>
