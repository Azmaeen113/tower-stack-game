<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hex Dodge</title>
<style>
* { margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Courier New',monospace; user-select:none; }
canvas { display:block; position:absolute; top:0; left:0; }
#hud { position:absolute; top:0; left:0; right:0; padding:18px; display:flex; justify-content:space-between; align-items:flex-start; gap:8px; pointer-events:none; z-index:10; }
.hc { background:rgba(0,255,136,0.07); border:1px solid rgba(0,255,136,0.2); border-radius:14px; padding:9px 16px; backdrop-filter:blur(8px); flex:1; max-width:120px; }
.hc.lives { border-color:rgba(255,110,180,0.35); }
.hc.lives .hv { color:#ff6eb4; letter-spacing:2px; font-size:20px; }
.hl { font-size:9px; letter-spacing:3px; color:rgba(0,255,136,0.55); display:block; margin-bottom:2px; }
.hv { font-size:24px; font-weight:900; color:#00ff88; display:block; }
#tap-hint { position:absolute; bottom:25px; left:0; right:0; display:flex; justify-content:space-between; padding:0 30px; pointer-events:none; z-index:10; }
.th { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:12px 28px; color:rgba(255,255,255,0.25); font-size:11px; letter-spacing:3px; font-family:'Courier New',monospace; }
#overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.92); z-index:30; backdrop-filter:blur(16px); }
.ot { font-size:52px; font-weight:900; letter-spacing:3px; background:linear-gradient(135deg,#00ff88,#00cfff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; text-align:center; }
.os { font-size:10px; letter-spacing:5px; color:rgba(255,255,255,0.25); margin:8px 0 44px; }
.ob { padding:17px 56px; border-radius:10px; background:linear-gradient(135deg,#00ff88,#00cfff); border:none; font-size:17px; font-weight:900; color:#000; letter-spacing:3px; cursor:pointer; box-shadow:0 0 40px #00ff8844; font-family:'Courier New',monospace; }
.ob:active{transform:scale(0.94);}
.ob.sec { background:linear-gradient(135deg,#ffd700,#ff8800); box-shadow:0 0 40px #ffd70044; margin-top:10px; }
.obest { color:rgba(0,255,136,0.45); font-size:12px; margin-top:20px; letter-spacing:2px; }
.obest span{color:#00ff88;font-weight:bold;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hc"><span class="hl">SCORE</span><span class="hv" id="hSc">0</span></div>
  <div class="hc lives"><span class="hl">LIVES</span><span class="hv" id="hLv">■■■</span></div>
  <div class="hc"><span class="hl">BEST</span><span class="hv" id="hBs">0</span></div>
</div>
<div id="tap-hint">
  <div class="th">◀ LEFT</div>
  <div class="th">RIGHT ▶</div>
</div>
<div id="overlay">
  <div class="ot">HEX<br>DODGE</div>
  <div class="os">TAP LEFT · RIGHT TO DODGE</div>
  <button class="ob" id="ovBtn">PLAY</button>
  <div class="obest">BEST <span id="ovBest">0</span></div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=canvas.width=window.innerWidth;
const H=canvas.height=window.innerHeight;
const hi=()=>+localStorage.getItem('hd_hi')||0;
document.getElementById('hBs').textContent=hi();
document.getElementById('ovBest').textContent=hi();

function rand(a,b){return a+Math.random()*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}

// ── Lanes setup ──
const LANE_COUNT=5;
const LANE_W=Math.min(W/LANE_COUNT,80);
const TOTAL_W=LANE_W*LANE_COUNT;
const ORIGIN_X=(W-TOTAL_W)/2;
function laneX(i){ return ORIGIN_X+i*LANE_W+LANE_W/2; }
const HEX_R=LANE_W*0.38;
const PLAYER_Y=H*0.8;

// ── State ──
let state='menu',score=0,frame=0;
let playerLane=2, playerX=laneX(2), playerTargetX=laneX(2);
let obstacles=[],particles=[],floats=[],bgHexes=[];
let spawnTimer=0, spawnInterval=58, fallSpeed=4.5;
let shakeT=0, invincible=0, dead=false;
let bgScroll=0;
let audioCtx=null, masterGain=null, audioUnlocked=false;

function ensureAudio(){
  if(!audioCtx){
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return Promise.resolve(false);
    audioCtx=new AC();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=0.9;
    masterGain.connect(audioCtx.destination);
  }
  if(audioCtx.state==='running'){
    audioUnlocked=true;
    return Promise.resolve(true);
  }
  return audioCtx.resume().then(function(){
    audioUnlocked=audioCtx.state==='running';
    return audioUnlocked;
  }).catch(function(){ return false; });
}

function playTone(freq,dur,type,gain,glideTo){
  if(!audioCtx||!masterGain||audioCtx.state!=='running') return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq,t);
  if(glideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(40,glideTo),t+dur);
  const peak=Math.max(0.0001,gain||0.18);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(peak,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.connect(g).connect(masterGain);
  osc.start(t);
  osc.stop(t+dur+0.02);
}

function playMoveSound(){ playTone(520,0.07,'square',0.16,760); }
function playScoreSound(){
  playTone(740,0.09,'sine',0.18,980);
  setTimeout(function(){ playTone(980,0.11,'sine',0.14); },55);
}
function playHitSound(){
  playTone(200,0.2,'sawtooth',0.22,80);
  setTimeout(function(){ playTone(130,0.24,'square',0.16,60); },90);
}
function playStartSound(){
  [440,554,660,880].forEach(function(f,i){
    setTimeout(function(){ playTone(f,0.13,'sine',0.16); },i*75);
  });
}
function playGameOverSound(){
  playTone(350,0.28,'sawtooth',0.2,100);
  setTimeout(function(){ playTone(230,0.36,'sawtooth',0.16,70); },170);
  setTimeout(function(){ playTone(120,0.48,'square',0.14,45); },340);
}

const COLORS=['#00ff88','#00cfff','#ff6eb4','#a855f7','#ffd700','#ff4500'];

function getFallSpeed(){
  return 4.5+score*0.07+Math.floor(score/40)*0.9;
}
function getSpawnInterval(){
  return Math.max(20,58-score*0.38-Math.floor(score/25)*4);
}
function syncDifficulty(){
  fallSpeed=getFallSpeed();
  spawnInterval=getSpawnInterval();
}

function hexPath(x,y,r){
  ctx.beginPath();
  for(let i=0;i<6;i++){ const a=i*Math.PI/3-Math.PI/6; i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r); }
  ctx.closePath();
}

// background hex grid
bgHexes=Array.from({length:30},()=>({
  x:rand(0,W), y:rand(0,H),
  r:rand(20,55), phase:rand(0,Math.PI*2), spd:rand(0.005,0.015),
  col:COLORS[Math.floor(Math.random()*COLORS.length)], vy:rand(0.3,1.2)
}));

class Obstacle {
  constructor(){
    // spawn pattern: 1-3 lanes blocked
    this.lanes=[];
    const blocked=Math.floor(rand(1,Math.min(3,1+score/40)+1));
    const all=[0,1,2,3,4];
    for(let i=0;i<blocked;i++){
      const idx=Math.floor(Math.random()*all.length);
      this.lanes.push(all.splice(idx,1)[0]);
    }
    this.y=-HEX_R*2;
    this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
    this.rot=0; this.rotSpd=rand(-0.02,0.02);
    this.alive=true;
  }
  update(){
    this.y+=fallSpeed;
    this.rot+=this.rotSpd;
  }
  draw(){
    this.lanes.forEach(l=>{
      const x=laneX(l);
      ctx.save();
      ctx.translate(x,this.y); ctx.rotate(this.rot);
      ctx.shadowColor=this.color; ctx.shadowBlur=18;
      ctx.strokeStyle=this.color; ctx.lineWidth=2.5;
      ctx.fillStyle=this.color+'22';
      hexPath(0,0,HEX_R*0.9); ctx.fill(); ctx.stroke();
      // inner ring
      ctx.shadowBlur=8; ctx.strokeStyle=this.color+'88'; ctx.lineWidth=1.5;
      hexPath(0,0,HEX_R*0.55); ctx.stroke();
      ctx.restore();
    });
  }
  hits(lane){ return this.lanes.includes(lane) && Math.abs(this.y-PLAYER_Y)<HEX_R*1.6; }
}

class Spark{
  constructor(x,y,col){this.x=x;this.y=y;this.col=col;const a=rand(0,Math.PI*2),s=rand(4,11);this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-2;this.life=1;this.r=rand(2,7);}
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.35;this.life-=0.05;}
  draw(){ctx.save();ctx.globalAlpha=this.life*this.life;ctx.fillStyle=this.col;ctx.shadowColor=this.col;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);ctx.fill();ctx.restore();}
}
class FText{
  constructor(x,y,t,col,big){this.x=x;this.y=y;this.t=t;this.col=col;this.big=big;this.life=1;this.vy=-2;}
  update(){this.y+=this.vy;this.vy*=0.9;this.life-=0.025;}
  draw(){ctx.save();ctx.globalAlpha=this.life;ctx.fillStyle=this.col;ctx.shadowColor=this.col;ctx.shadowBlur=12;ctx.font=`900 ${this.big?28:20}px Courier New`;ctx.textAlign='center';ctx.fillText(this.t,this.x,this.y);ctx.restore();}
}

// ── Input ──
function moveLeft(){ if(!dead&&state==='playing'&&playerLane>0){ playerLane--; playerTargetX=laneX(playerLane); dogeEffect(); playMoveSound(); } }
function moveRight(){ if(!dead&&state==='playing'&&playerLane<LANE_COUNT-1){ playerLane++; playerTargetX=laneX(playerLane); dogeEffect(); playMoveSound(); } }
function dogeEffect(){ for(let i=0;i<5;i++) particles.push(new Spark(playerX,PLAYER_Y,'#00ff88')); }

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  ensureAudio();
  const t=e.touches[0];
  if(t.clientX<W/2) moveLeft(); else moveRight();
},{passive:false});
document.addEventListener('keydown',function(e){
  ensureAudio();
  if(e.key==='ArrowLeft'||e.key==='a') moveLeft();
  if(e.key==='ArrowRight'||e.key==='d') moveRight();
});
canvas.addEventListener('mousedown',function(e){
  ensureAudio();
  if(e.clientX<W/2) moveLeft(); else moveRight();
});

function startGame(){
  ensureAudio().then(function(){
    playStartSound();
  });
  state='playing'; score=10; frame=0; dead=false;
  playerLane=2; playerX=laneX(2); playerTargetX=laneX(2);
  obstacles=[]; particles=[]; floats=[];
  spawnTimer=0; invincible=60;
  syncDifficulty();
  shakeT=0; bgScroll=0;
  document.getElementById('hSc').textContent='10';
  document.getElementById('overlay').style.display='none';
}
function gameOver(){
  if(dead) return; dead=true; state='over'; shakeT=20;
  playGameOverSound();
  // Report score to parent webapp
  if(window.parent!==window){ window.parent.postMessage({type:'VVQ_GAME_SCORE',score:score},'*'); }
  const best=Math.max(score,hi());
  if(score>hi()) localStorage.setItem('hd_hi',score);
  document.getElementById('hBs').textContent=best;
  setTimeout(()=>{
    const ov=document.getElementById('overlay');
    ov.innerHTML=`
      <div class="ot" style="font-size:36px">GAME<br>OVER</div>
      <div class="os">HEXED</div>
      <div style="color:#fff;font-size:60px;font-weight:900;text-shadow:0 0 20px #00ff8877;margin:8px 0">${score}</div>
      ${score>=best&&score>0?'<div style="color:#ffd700;font-size:11px;letter-spacing:4px;margin-bottom:26px">NEW BEST!</div>':'<div style="color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:3px;margin-bottom:26px">BEST: '+best+'</div>'}
      <button class="ob" id="ovBtn">RETRY</button>
    `;
    ov.style.display='flex';
    document.getElementById('ovBtn').addEventListener('click',startGame);
  },550);
}
document.getElementById('ovBtn').addEventListener('click',startGame);

function drawBG(){
  ctx.fillStyle='#010810'; ctx.fillRect(0,0,W,H);
  bgScroll+=0.5;
  bgHexes.forEach(h=>{
    h.y+=h.vy; h.phase+=h.spd;
    if(h.y>H+80) h.y=-80;
    ctx.save();
    ctx.globalAlpha=0.05+Math.sin(h.phase)*0.03;
    ctx.shadowColor=h.col; ctx.shadowBlur=10;
    ctx.strokeStyle=h.col; ctx.lineWidth=1;
    hexPath(h.x,h.y,h.r); ctx.stroke();
    ctx.restore();
  });
  // lane dividers
  for(let i=0;i<=LANE_COUNT;i++){
    const x=ORIGIN_X+i*LANE_W;
    ctx.strokeStyle='rgba(0,255,136,0.04)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
}

function drawPlayer(){
  const x=playerX, y=PLAYER_Y;
  const flicker=invincible>0&&Math.floor(frame/3)%2===0;
  if(flicker) return;
  ctx.save();
  ctx.shadowColor='#00ff88'; ctx.shadowBlur=28;
  // outer glow
  ctx.globalAlpha=0.3;
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=3;
  hexPath(x,y,HEX_R*1.15); ctx.stroke();
  // main
  ctx.globalAlpha=1;
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=3;
  ctx.fillStyle='rgba(0,255,136,0.15)';
  hexPath(x,y,HEX_R); ctx.fill(); ctx.stroke();
  // inner
  ctx.shadowBlur=12; ctx.strokeStyle='rgba(0,255,136,0.6)'; ctx.lineWidth=1.5;
  hexPath(x,y,HEX_R*0.55); ctx.stroke();
  // center dot
  ctx.fillStyle='#00ff88'; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawLanePlatform(){
  ctx.save();
  ctx.strokeStyle='rgba(0,255,136,0.12)'; ctx.lineWidth=1.5;
  ctx.setLineDash([4,8]);
  for(let i=0;i<LANE_COUNT;i++){
    const x=laneX(i);
    ctx.beginPath(); ctx.moveTo(x,PLAYER_Y-HEX_R*2); ctx.lineTo(x,H); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function loop(){
  requestAnimationFrame(loop);
  frame++;
  let sx=0,sy=0;
  if(shakeT>0){sx=rand(-shakeT,shakeT);sy=rand(-shakeT,shakeT);shakeT*=0.72;if(shakeT<0.5)shakeT=0;}
  ctx.save(); ctx.translate(sx,sy);
  drawBG();
  drawLanePlatform();

  if(state==='playing'){
    // smooth player move
    playerX=lerp(playerX,playerTargetX,0.3);
    if(invincible>0) invincible--;
    // spawn + progressive speed
    spawnTimer++;
    syncDifficulty();
    if(spawnTimer>=spawnInterval){ spawnTimer=0; obstacles.push(new Obstacle()); }
    // update obstacles
    obstacles.forEach(o=>o.update());
    // collision
    if(invincible===0){
      obstacles.forEach(o=>{
        if(o.hits(playerLane)){
          invincible=40; shakeT=15;
          playHitSound();
          for(let i=0;i<18;i++) particles.push(new Spark(playerX,PLAYER_Y,'#ff4500'));
          floats.push(new FText(playerX,PLAYER_Y-60,'HIT!','#ff4500',true));
          score=Math.max(0,score-5);
          document.getElementById('hSc').textContent=score;
          syncDifficulty();
          if(score<=0) gameOver();
        }
      });
    }
    // score
    obstacles=obstacles.filter(o=>{
      if(o.y>H+60){
        if(!o.lanes.includes(playerLane)){
          score++;
          playScoreSound();
          document.getElementById('hSc').textContent=score;
          if(score>hi()) localStorage.setItem('hd_hi',score);
          syncDifficulty();
        }
        return false;
      }
      return true;
    });
    particles.forEach(p=>p.update()); particles=particles.filter(p=>p.life>0);
    floats.forEach(f=>f.update()); floats=floats.filter(f=>f.life>0);
    // score display
    document.getElementById('hSc').textContent=score;
  }

  obstacles.forEach(o=>o.draw());
  particles.forEach(p=>p.draw());
  drawPlayer();
  floats.forEach(f=>f.draw());
  ctx.restore();
}
loop();
</script>
</body>
</html>
