<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Merge - Ultimate Edition</title>
    <link rel="preload" as="image" href="mergenumbersbackground.webp">
    <style>
        :root {
            --text-main: #ffffff;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --slide-ms: 150ms;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; touch-action: none; }

        body {
            background-color: #0f111a;
            background-image: url('mergenumbersbackground.webp');
            background-size: cover;
            background-position: center;
            color: var(--text-main);
            font-family: var(--font-family);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(15,17,26,0.55) 0%, rgba(15,17,26,0.3) 45%, rgba(15,17,26,0.8) 100%);
            pointer-events: none;
            z-index: 0;
        }

        #fxCanvas {
            position: fixed; inset: 0; pointer-events: none; z-index: 20;
        }

        #game-container {
            width: 100%; max-width: 440px; height: 100%; max-height: 900px;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; position: relative; z-index: 5;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-bottom: 10px;
        }

        .brand-title {
            font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            background: linear-gradient(45deg, #ff4757, #ffa502, #2ed573);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .score-box {
            background: rgba(255,255,255,0.08); padding: 8px 16px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(12px); text-align: center;
        }
        .score-box p { font-size: 10px; text-transform: uppercase; color: #a4b0be; letter-spacing: 1px; }
        .score-box span { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; color: #2ed573; }

        #status-panel {
            background: rgba(255,255,255,0.06); border-radius: 18px; padding: 14px;
            margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        .panel-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .target-node { font-size: 13px; font-weight: 700; color: #ffa502; }
        .level-node {
            font-weight: 800; background: linear-gradient(135deg, #2ed573, #1abc9c);
            padding: 4px 12px; border-radius: 20px; font-size: 11px; color: #0f111a;
        }

        .progress-bar-container {
            width: 100%; height: 8px; background: rgba(0,0,0,0.35);
            border-radius: 6px; overflow: hidden; margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        #progress-fill {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #2ed573, #ffa502, #ff4757);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(46,213,115,0.4);
        }

        #grid-container {
            width: 100%; aspect-ratio: 1; position: relative;
            background: rgba(16, 20, 36, 0.92);
            border-radius: 22px; padding: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.55), inset 0 2px 10px rgba(255,255,255,0.06),
                        0 0 40px rgba(255,71,87,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            touch-action: none;
        }

        #grid-bg {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%; height: 100%;
        }

        .grid-cell {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #tile-layer {
            position: absolute; inset: 12px; pointer-events: none;
        }

        .tile-wrap {
            position: absolute; top: 0; left: 0;
            will-change: transform;
        }

        .tile {
            width: 100%; height: 100%; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.35), inset 0 2px 8px rgba(255,255,255,0.22);
        }

        .tile-new { animation: tileSpawn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .tile-merged { animation: tileMerge 0.28s cubic-bezier(0.22, 1, 0.36, 1); z-index: 5; }

        @keyframes tileSpawn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes tileMerge {
            0% { transform: scale(1); filter: brightness(1); }
            40% { transform: scale(1.18); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .tile-2    { background: linear-gradient(145deg, #636e72, #2d3436); font-size: 30px; color: #ecf0f1; }
        .tile-4    { background: linear-gradient(145deg, #74b9ff, #0984e3); font-size: 30px; }
        .tile-8    { background: linear-gradient(145deg, #55efc4, #00b894); font-size: 30px; }
        .tile-16   { background: linear-gradient(145deg, #ffeaa7, #fdcb6e); font-size: 26px; color: #2d3436; }
        .tile-32   { background: linear-gradient(145deg, #fab1a0, #e17055); font-size: 26px; }
        .tile-64   { background: linear-gradient(145deg, #ff7675, #d63031); font-size: 26px; }
        .tile-128  { background: linear-gradient(145deg, #fd79a8, #e84393); font-size: 22px; }
        .tile-256  { background: linear-gradient(145deg, #a29bfe, #6c5ce7); font-size: 22px; }
        .tile-512  { background: linear-gradient(145deg, #81ecec, #00cec9); font-size: 22px; }
        .tile-1024 { background: linear-gradient(145deg, #ffeaa7, #f39c12); font-size: 18px; color: #2d3436; }
        .tile-2048 { background: linear-gradient(145deg, #fff200, #f1c40f); font-size: 18px; color: #2d3436; animation: goldPulse 1.2s ease-in-out infinite; }

        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(241,196,15,0.6); }
            50% { box-shadow: 0 0 36px rgba(241,196,15,1); }
        }

        footer {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-top: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            color: #fff; padding: 12px 24px; border-radius: 14px;
            font-weight: 700; font-size: 14px; cursor: pointer;
        }
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.14); }

        .overlay {
            position: fixed; inset: 0; background: rgba(10,12,20,0.94);
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px;
            text-align: center; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(16px);
        }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .overlay h1 { font-size: 38px; font-weight: 900; margin-bottom: 10px; }
        .overlay p { color: #a4b0be; margin-bottom: 28px; font-size: 15px; line-height: 1.55; max-width: 360px; }

        .start-tile-preview { display: flex; gap: 10px; margin-bottom: 30px; }
        .preview-box {
            width: 58px; height: 58px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 800; font-size: 20px;
        }

        #mute-btn { background: transparent; border: none; font-size: 22px; cursor: pointer; }

        .score-pop {
            position: fixed; font-weight: 900; font-size: 1.4rem; color: #2ed573;
            pointer-events: none; z-index: 30;
            animation: scoreFloat 0.7s ease-out forwards;
            text-shadow: 0 0 12px rgba(46,213,115,0.6);
        }
        @keyframes scoreFloat {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { opacity: 1; transform: translate(-50%, -80%) scale(1.1); }
            100% { transform: translate(-50%, -140%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

<canvas id="fxCanvas"></canvas>

<div id="game-container">
    <header>
        <h1 class="brand-title">Tile Merge</h1>
        <div style="display:flex;gap:10px;align-items:center;">
            <button id="mute-btn">🔊</button>
            <div class="score-box"><p>Score</p><span id="score-val">0</span></div>
        </div>
    </header>

    <div id="status-panel">
        <div class="panel-row">
            <span class="level-node" id="level-val">LEVEL 1</span>
            <span class="target-node" id="target-val">HIT TARGET: 16</span>
        </div>
        <div class="panel-row"><span style="font-size:11px;color:#a4b0be;">Target time window</span></div>
        <div class="progress-bar-container"><div id="progress-fill"></div></div>
    </div>

    <div id="grid-container">
        <div id="grid-bg">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div id="tile-layer"></div>
    </div>

    <footer>
        <button class="btn" id="restart-action">RESET</button>
        <span style="font-size:12px;color:#747d8c;font-weight:600;">Swipe to merge tiles →</span>
    </footer>
</div>

<div id="menu-overlay" class="overlay active">
    <h1 style="background:linear-gradient(45deg,#ff4757,#ffa502);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">TILE MERGE</h1>
    <p>Swipe to slide tiles. Matching numbers merge and double! Hit each level target before time runs out.</p>
    <div class="start-tile-preview">
        <div class="preview-box tile-4" style="transform:rotate(-8deg)">4</div>
        <div class="preview-box tile-16" style="transform:scale(1.1);z-index:2">16</div>
        <div class="preview-box tile-64" style="transform:rotate(8deg)">64</div>
    </div>
    <button class="btn" id="start-action" style="padding:16px 40px;font-size:17px;border-color:#ff4757;background:rgba(255,71,87,0.15)">START PLAYING</button>
</div>

<div id="gameover-overlay" class="overlay">
    <h1 style="color:#ff4757;">GRID LOCKED</h1>
    <p id="gameover-reason">Time ran out!</p>
    <div class="score-box" style="margin-bottom:28px;display:inline-block;">
        <p>Final Score</p><span id="final-score-val" style="font-size:32px;color:#2ed573;">0</span>
    </div>
    <button class="btn" id="retry-action" style="padding:14px 36px;">TRY AGAIN</button>
</div>

<script>
const CONFIG = { size: 4, baseTime: 40000, timeReductionPerLevel: 3500, minTimeLimit: 12000, animMs: 150 };
const VECTORS = { 0: { r: -1, c: 0 }, 1: { r: 0, c: 1 }, 2: { r: 1, c: 0 }, 3: { r: 0, c: -1 } };
const TILE_COLORS = { 2:'#636e72', 4:'#0984e3', 8:'#00b894', 16:'#fdcb6e', 32:'#e17055', 64:'#d63031', 128:'#e84393', 256:'#6c5ce7', 512:'#00cec9', 1024:'#f39c12', 2048:'#f1c40f' };

let gameState = { grid: [], score: 0, level: 1, currentTarget: 16, timeLeft: 0, maxTime: 40000, isGameOver: false, soundMuted: false };
let tileMap = {};
let nextTileId = 1;
let animating = false;
let timerInterval = null;
let pointerActive = false, pointerStartX = 0, pointerStartY = 0;
const SWIPE_THRESHOLD = 36;

const gridContainer = document.getElementById('grid-container');
const tileLayer = document.getElementById('tile-layer');
const scoreVal = document.getElementById('score-val');
const levelVal = document.getElementById('level-val');
const targetVal = document.getElementById('target-val');
const progressFill = document.getElementById('progress-fill');
const menuOverlay = document.getElementById('menu-overlay');
const gameoverOverlay = document.getElementById('gameover-overlay');
const finalScoreVal = document.getElementById('final-score-val');
const gameoverReason = document.getElementById('gameover-reason');

const canvas = document.getElementById('fxCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener('resize', resizeCanvas);
resizeCanvas();

const AudioEngine = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        if (gameState.soundMuted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        if (type === 'spawn') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(240, now);
            osc.frequency.exponentialRampToValueAtTime(480, now + 0.1);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
            osc.start(now); osc.stop(now + 0.12);
        } else if (type === 'merge') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(420, now);
            osc.frequency.setValueAtTime(620, now + 0.06);
            osc.frequency.setValueAtTime(820, now + 0.12);
            gain.gain.setValueAtTime(0.22, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
            osc.start(now); osc.stop(now + 0.22);
        } else if (type === 'target') {
            [523, 659, 784, 1047].forEach((f, i) => {
                const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.type = 'sine'; o.frequency.value = f;
                g.gain.setValueAtTime(0.12, now + i * 0.07);
                g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.07 + 0.25);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(now + i * 0.07); o.stop(now + i * 0.07 + 0.25);
            });
        } else if (type === 'gameover') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(70, now + 0.5);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }
};

class Particle {
    constructor(x, y, color, type) {
        this.x = x; this.y = y; this.color = color; this.type = type || 'dot';
        this.size = Math.random() * 5 + 3;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1; this.decay = Math.random() * 0.028 + 0.022;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.95; this.vy *= 0.95; this.life -= this.decay; }
    draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        if (this.type === 'ring') {
            ctx.strokeStyle = this.color; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size * (2.2 - this.life), 0, Math.PI * 2); ctx.stroke();
        } else {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }
}

function spawnExplosion(x, y, color) {
    for (let i = 0; i < 18; i++) particles.push(new Particle(x, y, color, i % 4 === 0 ? 'ring' : 'dot'));
    particles.push(new Particle(x, y, '#fff', 'ring'));
}

(function fxLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(fxLoop);
})();

function emptyGrid() { return Array(CONFIG.size).fill(null).map(() => Array(CONFIG.size).fill(null)); }

function getMetrics() {
    const cell = document.querySelector('.grid-cell');
    const gap = 12;
    const w = cell.offsetWidth, h = cell.offsetHeight;
    return { w, h, gap };
}

function cellXY(row, col) {
    const { w, h, gap } = getMetrics();
    return { x: col * (w + gap), y: row * (h + gap), w, h };
}

function setTilePosition(tile, row, col, animate) {
    const p = cellXY(row, col);
    tile.wrap.style.width = p.w + 'px';
    tile.wrap.style.height = p.h + 'px';
    tile.wrap.style.transition = animate ? `transform ${CONFIG.animMs}ms cubic-bezier(0.22,1,0.36,1)` : 'none';
    tile.wrap.style.transform = `translate(${p.x}px, ${p.y}px)`;
    tile.row = row; tile.col = col;
}

function createTile(row, col, value, isNew) {
    const id = nextTileId++;
    const wrap = document.createElement('div');
    wrap.className = 'tile-wrap';
    const inner = document.createElement('div');
    inner.className = `tile tile-${value}${isNew ? ' tile-new' : ''}`;
    inner.textContent = value;
    wrap.appendChild(inner);
    tileLayer.appendChild(wrap);
    const tile = { id, value, row, col, wrap, inner, merged: false };
    tileMap[id] = tile;
    gameState.grid[row][col] = tile;
    setTilePosition(tile, row, col, false);
    return tile;
}

function removeTile(tile) {
    if (gameState.grid[tile.row][tile.col] === tile) gameState.grid[tile.row][tile.col] = null;
    delete tileMap[tile.id];
    tile.wrap.remove();
}

function updateTileValue(tile, value) {
    tile.value = value;
    tile.inner.className = `tile tile-${value} tile-merged`;
    tile.inner.textContent = value;
}

function buildTraversals(vector) {
    const rows = [], cols = [];
    for (let i = 0; i < CONFIG.size; i++) { rows.push(i); cols.push(i); }
    if (vector.r === 1) rows.reverse();
    if (vector.c === 1) cols.reverse();
    return { rows, cols };
}

function findFarthest(row, col, vector) {
    let prev, r = row, c = col;
    do {
        prev = { r, c };
        r += vector.r; c += vector.c;
        if (r < 0 || r >= CONFIG.size || c < 0 || c >= CONFIG.size) break;
    } while (gameState.grid[r][c]);
    return { farthest: prev, next: (r >= 0 && r < CONFIG.size && c >= 0 && c < CONFIG.size) ? { r, c } : null };
}

function showScorePop(x, y, pts) {
    const el = document.createElement('div');
    el.className = 'score-pop';
    el.textContent = '+' + pts;
    el.style.left = x + 'px'; el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
}

function move(direction) {
    if (animating || gameState.isGameOver || menuOverlay.classList.contains('active')) return;

    const vector = VECTORS[direction];
    const { rows, cols } = buildTraversals(vector);
    let moved = false;
    const mergeList = [];

    Object.values(tileMap).forEach(t => t.merged = false);

    rows.forEach(r => {
        cols.forEach(c => {
            const tile = gameState.grid[r][c];
            if (!tile) return;

            const { farthest, next } = findFarthest(r, c, vector);

            if (next && gameState.grid[next.r][next.c] && gameState.grid[next.r][next.c].value === tile.value && !gameState.grid[next.r][next.c].merged) {
                const target = gameState.grid[next.r][next.c];
                const newVal = tile.value * 2;
                mergeList.push({ target, consumed: tile, newVal, row: next.r, col: next.c });
                gameState.grid[r][c] = null;
                target.merged = true;
                moved = true;
            } else if (farthest.r !== r || farthest.c !== c) {
                gameState.grid[farthest.r][farthest.c] = tile;
                gameState.grid[r][c] = null;
                moved = true;
            }
        });
    });

    if (!moved) return;

    animating = true;

    Object.values(tileMap).forEach(tile => {
        if (gameState.grid[tile.row] && gameState.grid[tile.row][tile.col] === tile) {
            setTilePosition(tile, tile.row, tile.col, true);
        }
    });

    mergeList.forEach(m => {
        setTilePosition(m.consumed, m.row, m.col, true);
    });

    setTimeout(() => {
        let mergeScore = 0;
        mergeList.forEach(m => {
            updateTileValue(m.target, m.newVal);
            removeTile(m.consumed);
            mergeScore += m.newVal;
            const p = cellXY(m.row, m.col);
            const rect = gridContainer.getBoundingClientRect();
            const cx = rect.left + 12 + p.x + p.w / 2;
            const cy = rect.top + 12 + p.y + p.h / 2;
            spawnExplosion(cx, cy, TILE_COLORS[m.newVal] || '#fff');
            showScorePop(cx, cy - 10, m.newVal);
            checkTarget(m.newVal);
        });

        if (mergeList.length) {
            gameState.score += mergeScore;
            updateScoreUI();
            AudioEngine.play('merge');
        }

        spawnRandomTile();
        animating = false;
        checkLocked();
    }, CONFIG.animMs + 20);
}

function spawnRandomTile() {
    const empty = [];
    for (let r = 0; r < CONFIG.size; r++)
        for (let c = 0; c < CONFIG.size; c++)
            if (!gameState.grid[r][c]) empty.push({ r, c });
    if (!empty.length) return;
    const spot = empty[Math.floor(Math.random() * empty.length)];
    createTile(spot.r, spot.c, Math.random() < 0.9 ? 2 : 4, true);
    AudioEngine.play('spawn');
}

function checkTarget(val) {
    if (val >= gameState.currentTarget) {
        AudioEngine.play('target');
        spawnExplosion(innerWidth / 2, innerHeight / 3, '#ffa502');
        gameState.level++;
        gameState.score += 500;
        setupLevel();
        updateScoreUI();
    }
}

function setupLevel() {
    gameState.currentTarget = Math.pow(2, gameState.level + 3);
    gameState.maxTime = Math.max(CONFIG.minTimeLimit, CONFIG.baseTime - (gameState.level - 1) * CONFIG.timeReductionPerLevel);
    gameState.timeLeft = gameState.maxTime;
    levelVal.textContent = `LEVEL ${gameState.level}`;
    targetVal.textContent = `HIT TARGET: ${gameState.currentTarget}`;
    updateTimerBar();
}

function updateTimerBar() {
    const pct = (gameState.timeLeft / gameState.maxTime) * 100;
    progressFill.style.width = pct + '%';
    progressFill.style.background = pct < 30 ? '#ff4757' : pct < 55 ? '#ffa502' : 'linear-gradient(90deg,#2ed573,#ffa502,#ff4757)';
}

function updateScoreUI() { scoreVal.textContent = gameState.score; }

function startTimer() {
    clearInterval(timerInterval);
    let last = Date.now();
    timerInterval = setInterval(() => {
        if (gameState.isGameOver) return;
        const now = Date.now();
        gameState.timeLeft -= now - last;
        last = now;
        if (gameState.timeLeft <= 0) { gameState.timeLeft = 0; endGame("Time ran out — hit the target faster!"); }
        updateTimerBar();
    }, 100);
}

function checkLocked() {
    for (let r = 0; r < CONFIG.size; r++) {
        for (let c = 0; c < CONFIG.size; c++) {
            if (!gameState.grid[r][c]) return;
            if (r < CONFIG.size - 1 && gameState.grid[r][c].value === gameState.grid[r + 1][c].value) return;
            if (c < CONFIG.size - 1 && gameState.grid[r][c].value === gameState.grid[r][c + 1].value) return;
        }
    }
    endGame("No moves left — grid is full!");
}

function endGame(reason) {
    gameState.isGameOver = true;
    clearInterval(timerInterval);
    AudioEngine.play('gameover');
    gameoverReason.textContent = reason;
    finalScoreVal.textContent = gameState.score;
    gameoverOverlay.classList.add('active');
}

function initGame() {
    tileLayer.innerHTML = '';
    tileMap = {};
    nextTileId = 1;
    animating = false;
    gameState.grid = emptyGrid();
    gameState.score = 0;
    gameState.level = 1;
    gameState.isGameOver = false;
    updateScoreUI();
    setupLevel();
    createTile(Math.floor(Math.random() * 4), Math.floor(Math.random() * 4), 2, true);
    let r2, c2;
    do { r2 = Math.floor(Math.random() * 4); c2 = Math.floor(Math.random() * 4); } while (gameState.grid[r2][c2]);
    createTile(r2, c2, Math.random() < 0.5 ? 2 : 4, true);
    startTimer();
}

function canSwipe() {
    return !gameState.isGameOver && !animating && !menuOverlay.classList.contains('active') && !gameoverOverlay.classList.contains('active');
}

gridContainer.addEventListener('pointerdown', e => {
    if (!canSwipe()) return;
    e.preventDefault();
    pointerActive = true;
    pointerStartX = e.clientX;
    pointerStartY = e.clientY;
    AudioEngine.init();
    try { gridContainer.setPointerCapture(e.pointerId); } catch (_) {}
});

gridContainer.addEventListener('pointerup', e => {
    if (!pointerActive) return;
    pointerActive = false;
    const dx = e.clientX - pointerStartX;
    const dy = e.clientY - pointerStartY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_THRESHOLD) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : 3);
    else move(dy > 0 ? 2 : 0);
});

gridContainer.addEventListener('pointercancel', () => { pointerActive = false; });

window.addEventListener('keydown', e => {
    if (!canSwipe()) return;
    const map = { ArrowUp: 0, KeyW: 0, ArrowRight: 1, KeyD: 1, ArrowDown: 2, KeyS: 2, ArrowLeft: 3, KeyA: 3 };
    if (map[e.code] !== undefined) { e.preventDefault(); move(map[e.code]); }
});

document.getElementById('start-action').addEventListener('click', () => {
    AudioEngine.init();
    menuOverlay.classList.remove('active');
    initGame();
});

document.getElementById('retry-action').addEventListener('click', () => {
    gameoverOverlay.classList.remove('active');
    initGame();
});

document.getElementById('restart-action').addEventListener('click', () => {
    if (confirm('Reset the game?')) initGame();
});

document.getElementById('mute-btn').addEventListener('click', () => {
    gameState.soundMuted = !gameState.soundMuted;
    document.getElementById('mute-btn').textContent = gameState.soundMuted ? '🔇' : '🔊';
});
</script>
</body>
</html>
