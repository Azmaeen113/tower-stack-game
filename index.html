<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020108">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Color Pop 3D</title>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #020108;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-touch-callout: none; user-select: none;
  }
  body {
    /* Deep space background */
    background: radial-gradient(ellipse at 50% 0%, #0f0a20 0%, #05030a 45%, #020108 80%);
  }
  #bg-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: block; touch-action: none;
  }
  #ui-layer {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    display: flex; flex-direction: column;
  }
  
  /* Score now clean and top-centered */
  .score-box { 
    margin-top: max(16px, env(safe-area-inset-top));
    text-align: center; 
    color: #fff;
    pointer-events: none;
    z-index: 10;
  }
  .score-value { 
    font-size: 42px; 
    font-weight: 900; 
    color: #fff;
    text-shadow: 0 4px 16px rgba(0,0,0,0.9), 0 1px 4px rgba(0,0,0,0.8); 
    transition: color 0.15s ease-in-out;
    line-height: 1;
  }
  .best-row { 
    font-size: 13px; 
    opacity: 0.7; 
    font-weight: 700; 
    margin-top: 6px; 
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  }

  .timer-track {
    height: 7px; border-radius: 6px; background: rgba(255,255,255,0.12);
    overflow: hidden; 
    margin: 16px 24px 0;
    flex-shrink: 0;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }
  .timer-fill {
    height: 100%; width: 0%; border-radius: 6px;
    background: linear-gradient(90deg, #4fc3ff, #b07bff, #ff5566);
    transition: width 0.18s linear;
  }

  #combo-text {
    position: absolute; top: 36%; left: 50%; transform: translate(-50%, -50%);
    font-size: clamp(24px, 8vw, 36px); font-weight: 900; color: #fff;
    text-shadow: 0 0 16px rgba(255,170,255,0.85), 0 2px 4px rgba(0,0,0,0.4);
    opacity: 0; letter-spacing: 1px;
  }
  #combo-text.show { animation: comboPop 1.05s ease forwards; }
  @keyframes comboPop {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
    18%  { transform: translate(-50%, -50%) scale(1.18); opacity: 1; }
    35%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
  }

  .modal {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(2,1,8,0.85); pointer-events: auto; padding: 20px;
  }
  .modal.hidden { display: none; }
  .card {
    background: linear-gradient(160deg, rgba(30,15,50,0.92), rgba(10,5,20,0.96));
    border: 1px solid rgba(255,255,255,0.09); border-radius: 24px;
    padding: 34px 28px; max-width: 360px; width: 100%; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 40px rgba(120,60,200,0.25);
  }
  .modal-title {
    font-size: clamp(20px, 6vw, 26px); font-weight: 900; color: #fff;
    margin: 0 0 12px; letter-spacing: 1px;
    background: linear-gradient(90deg,#ff8a9b,#ffd166,#7be5ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .modal-text { color: rgba(255,255,255,0.78); font-size: 14.5px; line-height: 1.55; margin: 6px 0; }
  .modal-stat { color: #FFD23B; font-weight: 800; }
  .btn {
    margin-top: 20px; padding: 15px 38px; border: none; border-radius: 16px;
    font-size: 17px; font-weight: 800; letter-spacing: 0.5px; color: #1a0f2e;
    background: linear-gradient(135deg, #ffe066, #ff9966);
    box-shadow: 0 8px 0 rgba(0,0,0,0.25), 0 0 26px rgba(255,180,80,0.5);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.25); }
  .pulse { animation: pulseGlow 1.6s ease-in-out infinite; }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 8px 0 rgba(0,0,0,0.25), 0 0 18px rgba(255,180,80,0.4); }
    50%     { box-shadow: 0 8px 0 rgba(0,0,0,0.25), 0 0 36px rgba(255,180,80,0.85); }
  }
  .hint-row { display:flex; gap:8px; justify-content:center; margin-top: 16px; flex-wrap: wrap; }
  .hint-chip {
    width: 20px; height: 20px; border-radius: 5px; border: 1px solid #000;
    box-shadow: inset 0 -2px 3px rgba(0,0,0,0.35), inset 0 2px 3px rgba(255,255,255,0.35);
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="ui-layer">
  
  <div class="score-box">
    <div class="score-value" id="score-value">0</div>
    <div class="best-row">BEST <span id="best-score">0</span></div>
  </div>

  <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
  <div id="combo-text">COMBO</div>

  <div class="modal" id="start-screen">
    <div class="card">
      <div class="modal-title">COLOR POP 3D</div>
      <p class="modal-text">Tap a group of <b>2 or more</b> matching gems to pop them.</p>
      <p class="modal-text">Clear fast — the stack keeps rising. Don't let it reach the top!</p>
      <div class="hint-row">
        <div class="hint-chip" style="background:#FF0000"></div>
        <div class="hint-chip" style="background:#0088FF"></div>
        <div class="hint-chip" style="background:#00FF00"></div>
        <div class="hint-chip" style="background:#9900FF"></div>
        <div class="hint-chip" style="background:#FFFF00"></div>
        <div class="hint-chip" style="background:#FF6600"></div>
        <div class="hint-chip" style="background:#00FFFF"></div>
      </div>
      <button class="btn pulse" id="start-btn">TAP TO PLAY</button>
    </div>
  </div>

  <div class="modal hidden" id="gameover-screen">
    <div class="card">
      <div class="modal-title">STACK OVERFLOW!</div>
      <p class="modal-text">Score: <span class="modal-stat" id="final-score">0</span></p>
      <p class="modal-text">Best: <span class="modal-stat" id="best-score-display">0</span></p>
      <button class="btn pulse" id="restart-btn">PLAY AGAIN</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ===================== CONFIG ===================== */
var COLS = 8, ROWS = 12, CELL = 1; 
var COLORS = [
  { name:'red',    hex:0xFF0000 },
  { name:'blue',   hex:0x0088FF },
  { name:'green',  hex:0x00FF00 },
  { name:'purple', hex:0x9900FF },
  { name:'yellow', hex:0xFFFF00 },
  { name:'orange', hex:0xFF6600 },
  { name:'cyan',   hex:0x00FFFF }
];
var INITIAL_FILLED_ROWS = 6; 
var RISE_INTERVAL_START = 8000;
var RISE_INTERVAL_MIN = 3200;
var RISE_DECREMENT = 350;
var POP_ANIM_MS = 280;
var HIGHLIGHT_DELAY_MS = 120;

/* ===================== GLOBAL STATE ===================== */
var scene, camera, renderer, blockGroup, raycaster;
var particleTexture, bgPoints, dangerLine;
var grid, allBlocks = [], particleSystems = [], scorePopups = [];
var score = 0, bestScore = 0, combo = 0, comboResetTimer = null;
var riseTimer = 0, riseTimerMax = RISE_INTERVAL_START;
var gameRunning = false, gameOver = false;
var camDriftX = 0, camDriftY = 0, camBaseY = 0, camDistance = 10;
var pointerNDC = { x: 0, y: 0 };
var baseMaterials = [];
var gemGeometry, edgesGeo, edgeMaterial;
var blockIdCounter = 0;
var lastTime = 0;
var audioCtx = null;

/* ===================== HELPERS ===================== */
function colToX(c){ return (c - (COLS-1)/2) * CELL; }
function rowToY(r){ return ((ROWS-1)/2 - r) * CELL; }
function randomColorIndex(){ return Math.floor(Math.random() * COLORS.length); }
function damp(cur, target, lambda, dt){ return cur + (target - cur) * (1 - Math.exp(-lambda * dt)); }

/* ===================== GEOMETRY ===================== */
function createGemGeometry(size){
  var shape = new THREE.Shape();
  var s = size / 2, r = size * 0.22;
  shape.moveTo(-s+r, -s);
  shape.lineTo(s-r, -s);
  shape.quadraticCurveTo(s, -s, s, -s+r);
  shape.lineTo(s, s-r);
  shape.quadraticCurveTo(s, s, s-r, s);
  shape.lineTo(-s+r, s);
  shape.quadraticCurveTo(-s, s, -s, s-r);
  shape.lineTo(-s, -s+r);
  shape.quadraticCurveTo(-s, -s, -s+r, -s);
  var extrudeSettings = {
    depth: size * 0.45, 
    bevelEnabled: true,
    bevelThickness: size * 0.1,
    bevelSize: size * 0.08,
    bevelSegments: 2,
    curveSegments: 6
  };
  var geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  geo.center();
  return geo;
}

function makeCircleTexture(){
  var size = 64;
  var cv = document.createElement('canvas');
  cv.width = cv.height = size;
  var ctx = cv.getContext('2d');
  var grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0.8)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(cv);
}

/* ===================== BACKGROUND ===================== */
function createBgParticles(){
  var count = 300;
  var positions = new Float32Array(count*3);
  for (var i=0;i<count;i++){
    positions[i*3]   = (Math.random()-0.5)*24;
    positions[i*3+1] = (Math.random()-0.5)*28;
    positions[i*3+2] = -3 - Math.random()*8;
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  var mat = new THREE.PointsMaterial({
    color: 0xffffff, size: 0.07, transparent:true, opacity: 0.7
  });
  bgPoints = new THREE.Points(geo, mat);
  scene.add(bgPoints);
}

function updateBgParticles(dt){
  var pos = bgPoints.geometry.attributes.position.array;
  for (var i=0;i<pos.length/3;i++){
    pos[i*3+1] += dt*0.08; 
    if (pos[i*3+1] > 14){
      pos[i*3+1] = -14;
      pos[i*3] = (Math.random()-0.5)*24;
    }
  }
  bgPoints.geometry.attributes.position.needsUpdate = true;
}

function createDangerLine(){
  var geo = new THREE.PlaneGeometry(COLS*CELL*1.4, 0.05);
  var mat = new THREE.MeshBasicMaterial({ color:0xff3b5c, transparent:true, opacity:0.4, side:THREE.DoubleSide });
  dangerLine = new THREE.Mesh(geo, mat);
  dangerLine.position.set(0, rowToY(-0.5), -0.1);
  scene.add(dangerLine);
}

/* ===================== BLOCKS ===================== */
function createBlock(colorIndex, row, col, spawnFromBelow){
  var mat = baseMaterials[colorIndex].clone();
  var mesh = new THREE.Mesh(gemGeometry, mat);
  var edgeLines = new THREE.LineSegments(edgesGeo, edgeMaterial);
  edgeLines.raycast = function(){};
  mesh.add(edgeLines);
  var x = colToX(col);
  var targetY = rowToY(row);
  mesh.position.set(x, spawnFromBelow ? rowToY(ROWS+1) : targetY, 0);
  blockGroup.add(mesh);
  var block = {
    mesh: mesh, colorIndex: colorIndex, row: row, col: col, targetY: targetY,
    popping: false, highlighted: false,
    bobSeed: Math.random()*1000,
    id: blockIdCounter++
  };
  mesh.userData.block = block;
  allBlocks.push(block);
  return block;
}

function setupBoard(){
  while (blockGroup.children.length){
    var m = blockGroup.children[0];
    blockGroup.remove(m);
    if (m.material) m.material.dispose();
  }
  grid = [];
  for (var r=0;r<ROWS;r++){ grid.push(new Array(COLS).fill(null)); }
  allBlocks.length = 0;
  for (var rr=ROWS-INITIAL_FILLED_ROWS; rr<ROWS; rr++){
    for (var c=0;c<COLS;c++){
      var ci = randomColorIndex();
      var b = createBlock(ci, rr, c, false);
      grid[rr][c] = b;
    }
  }
}

/* ===================== FLOOD FILL / MATCH LOGIC ===================== */
function floodFill(row, col){
  var startBlock = grid[row][col];
  if (!startBlock) return [];
  var target = startBlock.colorIndex;
  var visited = {};
  var stack = [[row,col]];
  var result = [];
  while (stack.length){
    var cell = stack.pop();
    var r = cell[0], c = cell[1];
    var key = r + ',' + c;
    if (visited[key]) continue;
    visited[key] = true;
    if (r<0||r>=ROWS||c<0||c>=COLS) continue;
    var b = grid[r][c];
    if (!b || b.colorIndex !== target || b.popping) continue;
    result.push(b);
    stack.push([r-1,c],[r+1,c],[r,c-1],[r,c+1]);
  }
  return result;
}

function applyGravityColumn(col){
  var remaining = [];
  for (var r=0;r<ROWS;r++){
    if (grid[r][col]) remaining.push(grid[r][col]);
    grid[r][col] = null;
  }
  var startRow = ROWS - remaining.length;
  for (var i=0;i<remaining.length;i++){
    var newRow = startRow + i;
    var b = remaining[i];
    b.row = newRow;
    grid[newRow][col] = b;
    b.targetY = rowToY(newRow);
  }
}

/* ===================== SMART SPAWNING / NEW ROW ===================== */
function insertNewRow(){
  var overflowed = false;
  
  // First, shift everything up one row
  for (var r=0;r<ROWS;r++){
    for (var c=0;c<COLS;c++){
      var b = grid[r][c];
      if (b){
        grid[r][c] = null;
        var newRow = r - 1;
        if (newRow < 0){
          overflowed = true;
          b.targetY = rowToY(-1.5);
        } else {
          grid[newRow][c] = b;
          b.row = newRow;
          b.targetY = rowToY(newRow);
        }
      }
    }
  }

  // Then, generate the new bottom row (Smart Spawning)
  for (var cc=0; cc<COLS; cc++){
    var ci = randomColorIndex();
    
    // Check how high the blocks currently are in this specific column
    var topRow = ROWS;
    for(var r=0; r<ROWS; r++) { 
        if(grid[r][cc]) { 
            topRow = r; 
            break; 
        } 
    }
    
    // SMART SPAWN: If this column is reaching the danger zone (top 4 rows),
    // FORCE the new block to be the same color as the block right above it!
    // This gives the player a guaranteed match to drop the dangerously high column.
    if (topRow <= 4) {
       var blockAbove = grid[ROWS-2][cc]; // The block that was just shifted up
       if (blockAbove) {
           ci = blockAbove.colorIndex;
       }
    } else {
       // Normal spawning, but occasionally force a horizontal pair to keep the board playable
       if (cc > 0 && Math.random() > 0.75) {
           ci = grid[ROWS-1][cc-1].colorIndex; 
       }
    }
    
    var nb = createBlock(ci, ROWS-1, cc, true);
    grid[ROWS-1][cc] = nb;
  }
  
  riseTimerMax = Math.max(RISE_INTERVAL_MIN, riseTimerMax - RISE_DECREMENT);
  riseTimer = riseTimerMax;
  if (overflowed) triggerGameOver();
  return overflowed;
}

/* ===================== POP / SCORE / FX ===================== */
function popGroup(group){
  if (group.length < 2) return;
  var now = performance.now();
  var multiplier = 1 + combo*0.12;
  var gained = Math.round(group.length*group.length*4*multiplier);
  
  var groupColorHex = COLORS[group[0].colorIndex].hex;
  
  var sumX=0, sumY=0;
  for (var i=0;i<group.length;i++){
    var b = group[i];
    grid[b.row][b.col] = null;
    b.popping = true;
    b.popStart = now;
    b.popStartScale = b.mesh.scale.x;
    sumX += b.mesh.position.x;
    sumY += b.mesh.position.y;
  }
  var cx = sumX/group.length, cy = sumY/group.length;
  
  addScore(gained);
  updateScoreColor(groupColorHex);
  
  spawnScorePopup(gained, cx, cy);
  spawnBurst(cx, cy, groupColorHex, Math.min(group.length,10));
  combo++;
  updateComboUI();
  clearTimeout(comboResetTimer);
  comboResetTimer = setTimeout(function(){ combo = 0; }, 2200);
  playPopSound(group.length);
  if (navigator.vibrate) { try { navigator.vibrate(group.length>5?40:18); } catch(e){} }
  var cols = {};
  for (var j=0;j<group.length;j++) cols[group[j].col] = true;
  for (var k in cols) applyGravityColumn(parseInt(k,10));
}

function commitPop(group){
  for (var i=0;i<group.length;i++) group[i].highlighted = false;
  popGroup(group);
}

function spawnBurst(x, y, hex, count){
  var n = count * 4;
  var positions = new Float32Array(n*3);
  var velocities = new Float32Array(n*3);
  for (var i=0;i<n;i++){
    positions[i*3]=x; positions[i*3+1]=y; positions[i*3+2]=0;
    var ang = Math.random()*Math.PI*2;
    var speed = 0.6 + Math.random()*1.4;
    velocities[i*3]   = Math.cos(ang)*speed;
    velocities[i*3+1] = Math.sin(ang)*speed + 0.6;
    velocities[i*3+2] = (Math.random()-0.5)*0.6;
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  var mat = new THREE.PointsMaterial({
    color:hex, size:0.14, map:particleTexture, transparent:true,
    depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true
  });
  var pts = new THREE.Points(geo, mat);
  scene.add(pts);
  particleSystems.push({ pts:pts, velocities:velocities, start:performance.now(), duration:650 });
}

function updateParticles(time, dt){
  for (var i=particleSystems.length-1;i>=0;i--){
    var ps = particleSystems[i];
    var t = (time - ps.start)/ps.duration;
    if (t >= 1){
      scene.remove(ps.pts);
      ps.pts.geometry.dispose();
      ps.pts.material.dispose();
      particleSystems.splice(i,1);
      continue;
    }
    var pos = ps.pts.geometry.attributes.position.array;
    for (var j=0;j<pos.length/3;j++){
      pos[j*3]   += ps.velocities[j*3]*dt;
      pos[j*3+1] += ps.velocities[j*3+1]*dt - dt*1.2*t;
      pos[j*3+2] += ps.velocities[j*3+2]*dt;
    }
    ps.pts.geometry.attributes.position.needsUpdate = true;
    ps.pts.material.opacity = 1 - t;
  }
}

function spawnScorePopup(amount, x, y){
  var cv = document.createElement('canvas');
  cv.width = 256; cv.height = 96;
  var ctx = cv.getContext('2d');
  ctx.font = 'bold 56px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.strokeText('+'+amount, 128, 48);
  ctx.fillStyle = '#fff';
  ctx.fillText('+'+amount, 128, 48);
  var tex = new THREE.CanvasTexture(cv);
  var mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false });
  var spr = new THREE.Sprite(mat);
  spr.position.set(x, y, 0.4);
  spr.scale.set(1.1, 0.42, 1);
  scene.add(spr);
  scorePopups.push({ spr:spr, start:performance.now(), duration:850, baseY:y });
}

function updateScorePopups(time){
  for (var i=scorePopups.length-1;i>=0;i--){
    var p = scorePopups[i];
    var t = (time - p.start)/p.duration;
    if (t >= 1){
      scene.remove(p.spr);
      p.spr.material.map.dispose();
      p.spr.material.dispose();
      scorePopups.splice(i,1);
      continue;
    }
    p.spr.position.y = p.baseY + t*1.1;
    p.spr.material.opacity = 1 - t;
  }
}

/* ===================== INPUT ===================== */
function pickBlock(clientX, clientY){
  var ndc = new THREE.Vector2((clientX/window.innerWidth)*2-1, -(clientY/window.innerHeight)*2+1);
  raycaster.setFromCamera(ndc, camera);
  var hits = raycaster.intersectObjects(blockGroup.children, true);
  for (var i=0;i<hits.length;i++){
    var obj = hits[i].object;
    if (obj.userData && obj.userData.block) return obj.userData.block;
  }
  return null;
}

function onPointerDown(x, y){
  if (!gameRunning || gameOver) return;
  var block = pickBlock(x, y);
  if (!block || block.popping || block.highlighted) return;
  var group = floodFill(block.row, block.col);
  if (group.length >= 2){
    var alreadyPending = false;
    for (var i=0;i<group.length;i++){
      if (group[i].highlighted) { alreadyPending = true; break; }
    }
    if (alreadyPending) return;
    for (var j=0;j<group.length;j++) group[j].highlighted = true;
    playTickSound();
    setTimeout(function(){ commitPop(group); }, HIGHLIGHT_DELAY_MS);
  } else {
    block.mesh.scale.setScalar(0.82);
    playDeniedSound();
  }
}

/* ===================== AUDIO ===================== */
function ensureAudio(){
  if (!audioCtx){
    var AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, duration, type, gainVal, glideTo){
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, audioCtx.currentTime+duration);
  gain.gain.value = gainVal || 0.15;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+duration);
}
function playPopSound(n){ playTone(380+n*22, 0.18, 'triangle', 0.18, 700+n*30); }
function playTickSound(){ playTone(900, 0.04, 'sine', 0.05); }
function playDeniedSound(){ playTone(140, 0.12, 'sawtooth', 0.08); }
function playRiseSound(){ playTone(120, 0.3, 'sine', 0.12, 60); }
function playGameOverSound(){ playTone(300, 0.6, 'sawtooth', 0.15, 40); }

/* ===================== UI ===================== */
function addScore(n){
  score += n;
  document.getElementById('score-value').textContent = score;
}
function updateScoreColor(hexNum){
  var colorString = '#' + hexNum.toString(16).padStart(6, '0');
  document.getElementById('score-value').style.color = colorString;
}
function updateComboUI(){
  if (combo >= 2){
    var el = document.getElementById('combo-text');
    el.textContent = 'COMBO x' + combo;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }
}
function updateTimerBar(){
  var pct = Math.max(0, riseTimer/riseTimerMax);
  document.getElementById('timer-fill').style.width = (pct*100) + '%';
}
function triggerGameOver(){
  if (gameOver) return;
  gameOver = true;
  gameRunning = false;
  playGameOverSound();
  if (score > bestScore) bestScore = score;
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score-display').textContent = bestScore;
  document.getElementById('best-score').textContent = bestScore;
  document.getElementById('gameover-screen').classList.remove('hidden');
}
function startGame(){
  setupBoard();
  score = 0; combo = 0;
  riseTimerMax = RISE_INTERVAL_START; riseTimer = riseTimerMax;
  gameOver = false; gameRunning = true;
  document.getElementById('score-value').textContent = '0';
  document.getElementById('score-value').style.color = '#fff';
  document.getElementById('best-score').textContent = bestScore;
  updateTimerBar();
}

/* ===================== CAMERA / RESIZE ===================== */
function fitCamera(){
  var aspect = window.innerWidth/window.innerHeight;
  camera.aspect = aspect;
  var fovRad = camera.fov*Math.PI/180;
  var gridW = COLS*CELL, gridH = ROWS*CELL;
  var desiredW = gridW/0.84;
  var desiredH = gridH/0.74;
  var distH = (desiredH/2)/Math.tan(fovRad/2);
  var distW = (desiredW/2)/(Math.tan(fovRad/2)*aspect);
  camDistance = Math.max(distH, distW);
  camBaseY = camDistance*0.1;
  camera.position.set(camDriftX||0, camBaseY, camDistance);
  camera.lookAt(0,0,0);
  camera.updateProjectionMatrix();
}
function onResize(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  fitCamera();
}

/* ===================== MAIN LOOP ===================== */
function animate(time){
  requestAnimationFrame(animate);
  var dt = Math.min((time-lastTime)/1000, 0.05);
  lastTime = time;

  if (gameRunning && !gameOver && !document.hidden){
    riseTimer -= dt*1000;
    updateTimerBar();
    if (riseTimer <= 0){
      var overflowed = insertNewRow();
      if (!overflowed) playRiseSound();
    }
  }

  for (var i=allBlocks.length-1;i>=0;i--){
    var b = allBlocks[i];
    if (b.popping){
      var t = Math.min((time-b.popStart)/POP_ANIM_MS, 1);
      var ease = 1 - Math.pow(1-t, 3);
      var s = Math.max(b.popStartScale*(1-ease), 0);
      b.mesh.scale.setScalar(s);
      b.mesh.position.y += dt*0.7;
      b.mesh.rotation.z += dt*5;
      b.mesh.material.opacity = 1-ease;
      if (t >= 1){
        blockGroup.remove(b.mesh);
        b.mesh.material.dispose();
        allBlocks.splice(i,1);
      }
    } else {
      b.mesh.position.y = damp(b.mesh.position.y, b.targetY, 9, dt);
      var targetScale = b.highlighted ? 1.22 : 1;
      var ns = damp(b.mesh.scale.x, targetScale, 16, dt);
      b.mesh.scale.setScalar(ns);
      b.mesh.position.z = Math.sin(time*0.0018 + b.bobSeed)*0.02;
    }
  }

  updateParticles(time, dt);
  updateScorePopups(time);
  if (bgPoints) updateBgParticles(dt);
  if (dangerLine) dangerLine.material.opacity = 0.35 + Math.sin(time*0.004)*0.15;

  camDriftX = damp(camDriftX, pointerNDC.x*0.35, 4, dt);
  camDriftY = damp(camDriftY, -pointerNDC.y*0.2, 4, dt);
  camera.position.x = camDriftX;
  camera.position.y = camBaseY + camDriftY;
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}

/* ===================== INIT ===================== */
function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  var dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(2,4,6);
  scene.add(dir);
  var rim1 = new THREE.PointLight(0x7de8ff, 0.7, 25);
  rim1.position.set(-5,3,5);
  scene.add(rim1);
  var rim2 = new THREE.PointLight(0xff6fd8, 0.7, 25);
  rim2.position.set(5,-2,5);
  scene.add(rim2);

  blockGroup = new THREE.Group();
  scene.add(blockGroup);

  gemGeometry = createGemGeometry(CELL * 0.82);
  edgesGeo = new THREE.EdgesGeometry(gemGeometry, 15);
  edgeMaterial = new THREE.LineBasicMaterial({ color:0x000000, transparent:false, opacity:1.0, linewidth: 2 });

  for (var i=0;i<COLORS.length;i++){
    var c = COLORS[i];
    baseMaterials.push(new THREE.MeshPhysicalMaterial({
      color: c.hex, emissive: c.hex, emissiveIntensity: 0.25,
      roughness: 0.2, metalness: 0.0, clearcoat: 0.8, clearcoatRoughness: 0.1,
      transparent: true, opacity: 1, side: THREE.DoubleSide
    }));
  }

  particleTexture = makeCircleTexture();
  createBgParticles();
  createDangerLine();
  raycaster = new THREE.Raycaster();

  setupBoard();
  fitCamera();

  window.addEventListener('resize', onResize);
  renderer.domElement.style.touchAction = 'none';
  renderer.domElement.addEventListener('pointerdown', function(e){ onPointerDown(e.clientX, e.clientY); });
  window.addEventListener('pointermove', function(e){
    pointerNDC.x = (e.clientX/window.innerWidth)*2-1;
    pointerNDC.y = (e.clientY/window.innerHeight)*2-1;
  });
  renderer.domElement.addEventListener('touchmove', function(e){
    if (e.touches && e.touches[0]){
      pointerNDC.x = (e.touches[0].clientX/window.innerWidth)*2-1;
      pointerNDC.y = (e.touches[0].clientY/window.innerHeight)*2-1;
    }
    e.preventDefault();
  }, { passive:false });

  document.getElementById('start-btn').addEventListener('click', function(){
    ensureAudio();
    document.getElementById('start-screen').classList.add('hidden');
    startGame();
  });
  document.getElementById('restart-btn').addEventListener('click', function(){
    ensureAudio();
    document.getElementById('gameover-screen').classList.add('hidden');
    startGame();
  });

  lastTime = performance.now();
  requestAnimationFrame(animate);
}

init();

})();
</script>
</body>
</html>
