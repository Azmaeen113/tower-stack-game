<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Blade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  :root {
    --cyan: #00f5ff;
    --pink: #ff0080;
    --gold: #ffd700;
    --dark: #050510;
    --card: #0d0d2b;
  }
  body {
    background: var(--dark);
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; touch-action: none; position: fixed; inset: 0; width: 100%; height: 100%; }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  .score-box {
    background: rgba(0,245,255,0.08);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 12px;
    padding: 8px 16px;
    color: var(--cyan);
    font-size: 13px;
    letter-spacing: 1px;
    backdrop-filter: blur(8px);
  }
  .score-val { font-size: 22px; font-weight: bold; display: block; }
  #lives { color: var(--pink); }
  #screen-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,5,16,0.92);
    z-index: 20;
    backdrop-filter: blur(12px);
    pointer-events: auto;
  }
  #screen-overlay.hidden { display: none !important; pointer-events: none; }
  .game-title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--cyan), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .game-subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: 3px;
    margin-bottom: 48px;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--cyan), var(--pink));
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 16px;
    font-weight: 700;
    color: #000;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,245,255,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    font-family: 'Courier New', monospace;
  }
  .btn-start:active { transform: scale(0.96); box-shadow: 0 0 15px rgba(0,245,255,0.2); }
  .hi-score { color: rgba(255,215,0,0.6); font-size: 13px; margin-top: 20px; letter-spacing: 2px; }
  .hi-val { color: var(--gold); font-weight: bold; }
  #combo-display {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 15px var(--gold);
  }
  .score-val.penalty {
    color: #ff5566 !important;
    text-shadow: 0 0 12px rgba(255,80,100,0.85);
    transition: color 0.15s ease, text-shadow 0.2s ease;
  }
  #alert-border {
    position: fixed; inset: 0; z-index: 30; pointer-events: none;
    box-shadow: inset 0 0 0 0 rgba(255,45,65,0);
    background: rgba(255,30,50,0);
  }
  #alert-border.show { animation: alertBorderFlash 0.7s ease-out forwards; }
  @keyframes alertBorderFlash {
    0%   { box-shadow: inset 0 0 0 0 rgba(255,45,65,0); background: rgba(255,30,50,0); }
    12%  { box-shadow: inset 0 0 0 7px rgba(255,55,75,1), inset 0 0 55px rgba(255,35,55,0.45); background: rgba(255,25,45,0.14); }
    35%  { box-shadow: inset 0 0 0 5px rgba(255,55,75,0.85), inset 0 0 35px rgba(255,35,55,0.28); background: rgba(255,25,45,0.08); }
    100% { box-shadow: inset 0 0 0 0 rgba(255,45,65,0); background: rgba(255,30,50,0); }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="alert-border" aria-hidden="true"></div>
<div id="ui">
  <div class="score-box">
    <span style="font-size:10px;letter-spacing:2px">SCORE</span>
    <span class="score-val" id="scoreDisplay">0</span>
  </div>
  <div class="score-box" id="lives">
    <span style="font-size:10px;letter-spacing:2px">LIVES</span>
    <span class="score-val" id="livesDisplay">&#9632;&#9632;&#9632;</span>
  </div>
</div>
<div id="combo-display"></div>
<div id="screen-overlay">
  <div class="game-title">NEON BLADE</div>
  <div class="game-subtitle">SLASH TO SURVIVE</div>
  <button class="btn-start" id="startBtn">TAP TO PLAY</button>
  <div class="hi-score">BEST: <span class="hi-val" id="hiDisplay">0</span></div>
</div>
<div id="gameover-overlay" class="hidden" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,16,0.92);z-index:20;backdrop-filter:blur(12px);pointer-events:auto;">
  <div class="game-title">GAME OVER</div>
  <div class="game-subtitle">BLADE BROKEN</div>
  <div id="finalScore" style="color:#fff;font-size:32px;font-weight:bold;margin:20px 0;letter-spacing:2px">0</div>
  <div class="hi-score">BEST: <span class="hi-val" id="hiDisplayEnd">0</span></div>
  <button class="btn-start" id="restartBtn" style="margin-top:30px">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

let score = 0, lives = 3, hiScore = parseInt(localStorage.getItem('nb_hi')||0);
let gameRunning = false, gameOver = false;
let objects = [], particles = [], floatTexts = [], slashTrail = [];
let combo = 0, comboTimer = 0;
let spawnInterval = 90, spawnCounter = 0;
let frame = 0;

const MAX_PARTICLES = 100;
const MAX_FLOAT_TEXTS = 20;
const MAX_OBJECTS = 35;

function resizeCanvas(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function clientToCanvas(cx, cy){
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
}

document.getElementById('hiDisplay').textContent = hiScore;
document.getElementById('hiDisplayEnd').textContent = hiScore;

const SHAPES = ['circle','diamond','triangle','star'];
const COLORS = ['#00f5ff','#ff0080','#a020f0','#00ff88','#ffaa00'];

function rand(a,b){ return a + Math.random()*(b-a); }

class GameObject {
  constructor() {
    this.x = rand(60, W-60);
    this.y = -60;
    this.r = rand(28, 42);
    this.speed = rand(2.5, 5.5) + score/2000;
    this.shape = SHAPES[Math.floor(Math.random()*SHAPES.length)];
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.rotation = 0;
    this.rotSpeed = rand(-0.04, 0.04);
    this.slashed = false;
    this.vx = rand(-0.5,0.5);
    this.glowPhase = Math.random()*Math.PI*2;
    this.isBomb = Math.random() < 0.15;
    if(this.isBomb){ this.color = '#ff3300'; this.shape='circle'; }
  }
  update(){
    this.y += this.speed;
    this.x += this.vx;
    this.rotation += this.rotSpeed;
    this.glowPhase += 0.05;
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const glow = 10 + Math.sin(this.glowPhase)*4;
    ctx.shadowColor = this.isBomb ? '#ff3300' : this.color;
    ctx.shadowBlur = glow;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 2.5;
    ctx.fillStyle = this.color + '22';
    ctx.beginPath();
    if(this.shape==='circle'){ ctx.arc(0,0,this.r,0,Math.PI*2); }
    else if(this.shape==='diamond'){
      ctx.moveTo(0,-this.r); ctx.lineTo(this.r,0); ctx.lineTo(0,this.r); ctx.lineTo(-this.r,0); ctx.closePath();
    }
    else if(this.shape==='triangle'){
      ctx.moveTo(0,-this.r); ctx.lineTo(this.r*0.866,this.r*0.5); ctx.lineTo(-this.r*0.866,this.r*0.5); ctx.closePath();
    }
    else if(this.shape==='star'){
      for(let i=0;i<5;i++){
        const a = (i*4*Math.PI/5)-Math.PI/2;
        const a2 = (i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
        if(i===0) ctx.moveTo(Math.cos(-Math.PI/2)*this.r, Math.sin(-Math.PI/2)*this.r);
        ctx.lineTo(Math.cos(a)*this.r, Math.sin(a)*this.r);
        ctx.lineTo(Math.cos(a2)*this.r*0.45, Math.sin(a2)*this.r*0.45);
      }
      ctx.closePath();
    }
    ctx.fill();
    ctx.stroke();
    if(this.isBomb){
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.font=`${this.r*0.9}px Arial`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.shadowBlur=0;
      ctx.fillText('!', 0, 1);
    }
    ctx.restore();
  }
}

class Particle {
  constructor(x,y,color){
    this.x=x; this.y=y; this.color=color;
    this.vx=rand(-6,6); this.vy=rand(-8,2);
    this.life=1; this.size=rand(3,8);
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.2; this.life-=0.04; }
  draw(){
    ctx.save();
    ctx.globalAlpha=this.life;
    ctx.shadowColor=this.color; ctx.shadowBlur=8;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

class FloatText {
  constructor(x,y,text,color){
    this.x=x; this.y=y; this.text=text; this.color=color;
    this.life=1; this.vy=-2;
  }
  update(){ this.y+=this.vy; this.life-=0.025; }
  draw(){
    ctx.save();
    ctx.globalAlpha=this.life;
    ctx.fillStyle=this.color;
    ctx.shadowColor=this.color; ctx.shadowBlur=10;
    ctx.font='bold 22px Courier New';
    ctx.textAlign='center';
    ctx.fillText(this.text,this.x,this.y);
    ctx.restore();
  }
}

function spawnParticles(x, y, color, count){
  for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++){
    particles.push(new Particle(x, y, color));
  }
}

function spawnFloatText(x, y, text, color){
  if (floatTexts.length >= MAX_FLOAT_TEXTS) floatTexts.shift();
  floatTexts.push(new FloatText(x, y, text, color));
}

function purgeSlashed(){
  objects = objects.filter(o => !o.slashed);
}

function trimArrays(){
  if (particles.length > MAX_PARTICLES) particles.length = MAX_PARTICLES;
  if (floatTexts.length > MAX_FLOAT_TEXTS) floatTexts.splice(0, floatTexts.length - MAX_FLOAT_TEXTS);
  if (objects.length > MAX_OBJECTS) objects = objects.slice(-MAX_OBJECTS);
}
let touching = false, touchX=0, touchY=0, prevTX=0, prevTY=0;

function setPointerPos(clientX, clientY){
  const p = clientToCanvas(clientX, clientY);
  prevTX = touchX;
  prevTY = touchY;
  touchX = p.x;
  touchY = p.y;
}

function beginSlash(clientX, clientY){
  const p = clientToCanvas(clientX, clientY);
  touching = true;
  touchX = prevTX = p.x;
  touchY = prevTY = p.y;
  slashTrail = [];
}

function moveSlash(clientX, clientY){
  if (!touching) return;
  setPointerPos(clientX, clientY);
  slashTrail.push({x: touchX, y: touchY, t: Date.now()});
  if (slashTrail.length > 16) slashTrail.shift();
  checkSlash();
}

function endSlash(){
  touching = false;
  slashTrail = [];
}

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  beginSlash(e.touches[0].clientX, e.touches[0].clientY);
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  moveSlash(e.touches[0].clientX, e.touches[0].clientY);
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  endSlash();
},{passive:false});

canvas.addEventListener('mousedown', e=>{ beginSlash(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e=>{ moveSlash(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', endSlash);
canvas.addEventListener('mouseleave', endSlash);

canvas.addEventListener('pointerdown', e=>{
  if (e.pointerType === 'mouse') return;
  e.preventDefault();
  beginSlash(e.clientX, e.clientY);
  try { canvas.setPointerCapture(e.pointerId); } catch(err){}
});
canvas.addEventListener('pointermove', e=>{
  if (e.pointerType === 'mouse') return;
  e.preventDefault();
  moveSlash(e.clientX, e.clientY);
});
canvas.addEventListener('pointerup', e=>{
  if (e.pointerType === 'mouse') return;
  endSlash();
  try { canvas.releasePointerCapture(e.pointerId); } catch(err){}
});

function dist(x1,y1,x2,y2){ return Math.sqrt((x2-x1)**2+(y2-y1)**2); }

function lineCircleDist(lx1,ly1,lx2,ly2,cx,cy){
  const dx=lx2-lx1, dy=ly2-ly1;
  const lenSq = dx*dx + dy*dy;
  if (lenSq < 0.001) return dist(lx1, ly1, cx, cy);
  const t=Math.max(0,Math.min(1,((cx-lx1)*dx+(cy-ly1)*dy)/lenSq));
  return dist(lx1+t*dx,ly1+t*dy,cx,cy);
}

function checkSlash(){
  if (!gameRunning || gameOver) return;
  objects.forEach(obj=>{
    if (obj.slashed) return;
    const d = lineCircleDist(prevTX, prevTY, touchX, touchY, obj.x, obj.y);
    if (d < obj.r + 10){
      obj.slashed = true;
      if (obj.isBomb){
        lives--;
        combo = 0;
        comboTimer = 0;
        updateLivesUI();
        spawnParticles(obj.x, obj.y, '#ff3300', 10);
        spawnFloatText(obj.x, obj.y - 40, '-1 LIFE', '#ff3300');
        screenShake(15);
        purgeSlashed();
        if (lives <= 0) endGame();
      } else {
        combo++;
        comboTimer = 120;
        const pts = combo >= 2 ? 2 : 1;
        score += pts;
        document.getElementById('scoreDisplay').textContent = score;
        spawnParticles(obj.x, obj.y, obj.color, 8);
        const label = combo >= 2 ? '+2 COMBO' : '+1';
        spawnFloatText(obj.x, obj.y - 30, label, obj.color);
        updateComboUI();
        purgeSlashed();
      }
    }
  });
}

let shakeAmt=0;
function screenShake(a){ shakeAmt=a; }

function updateLivesUI(){
  const symbols=['&#9632;&#9632;&#9632;','&#9632;&#9632;&#9633;','&#9632;&#9633;&#9633;','&#9633;&#9633;&#9633;'];
  document.getElementById('livesDisplay').innerHTML = symbols[3-Math.max(0,lives)] || symbols[3];
}

function updateComboUI(){
  const el = document.getElementById('combo-display');
  if (!el) return;
  if (combo >= 2){
    el.style.opacity = '1';
    el.textContent = 'COMBO x' + combo;
  } else {
    el.style.opacity = '0';
  }
}

function showMissAlert(){
  const border = document.getElementById('alert-border');
  border.classList.remove('show');
  void border.offsetWidth;
  border.classList.add('show');
}

function applyMissPenalty(x, y){
  combo = 0;
  comboTimer = 0;
  updateComboUI();
  showMissAlert();
  screenShake(6);
  spawnFloatText(x, y - 24, '-1', '#ff3355');
  if (score > 0){
    score = Math.max(0, score - 1);
    document.getElementById('scoreDisplay').textContent = score;
    const scoreEl = document.getElementById('scoreDisplay');
    scoreEl.classList.add('penalty');
    setTimeout(function(){ scoreEl.classList.remove('penalty'); }, 350);
  }
  if (navigator.vibrate) { try { navigator.vibrate([25, 40, 25]); } catch(e){} }
}

function endGame(){
  if (gameOver) return;
  gameOver = true;
  gameRunning = false;
  if (score > hiScore){
    hiScore = score;
    localStorage.setItem('nb_hi', hiScore);
  }
  document.getElementById('hiDisplay').textContent = hiScore;
  document.getElementById('hiDisplayEnd').textContent = hiScore;
  document.getElementById('finalScore').textContent = score;
  if (window.parent !== window){
    window.parent.postMessage({type:'VVQ_GAME_SCORE', score:score}, '*');
  }
  document.getElementById('screen-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').style.display = 'flex';
}

function startGame(){
  gameOver = false;
  score = 0; lives = 3; combo = 0; comboTimer = 0;
  objects = []; particles = []; floatTexts = []; slashTrail = [];
  spawnInterval = 90; spawnCounter = 0; frame = 0;
  document.getElementById('scoreDisplay').textContent = '0';
  updateLivesUI();
  updateComboUI();
  document.getElementById('screen-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').style.display = 'none';
  gameRunning = true;
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

let bgStars = Array.from({length:80},()=>({
  x:rand(0,W), y:rand(0,H),
  r:rand(0.5,2), blink:rand(0,Math.PI*2), speed:rand(0.01,0.03)
}));

function drawBG(){
  ctx.fillStyle='#050510';
  ctx.fillRect(0,0,W,H);
  bgStars.forEach(s=>{
    s.blink+=s.speed;
    ctx.globalAlpha=0.3+Math.sin(s.blink)*0.3;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawSlash(){
  if(slashTrail.length<2) return;
  ctx.save();
  for(let i=1;i<slashTrail.length;i++){
    const t=i/slashTrail.length;
    ctx.strokeStyle=`rgba(255,255,255,${t*0.8})`;
    ctx.lineWidth=t*8;
    ctx.lineCap='round';
    ctx.shadowColor='#00f5ff'; ctx.shadowBlur=15;
    ctx.beginPath();
    ctx.moveTo(slashTrail[i-1].x,slashTrail[i-1].y);
    ctx.lineTo(slashTrail[i].x,slashTrail[i].y);
    ctx.stroke();
  }
  ctx.restore();
}

function loop(){
  requestAnimationFrame(loop);
  frame++;

  // screen shake
  let sx=0,sy=0;
  if(shakeAmt>0){ sx=rand(-shakeAmt,shakeAmt); sy=rand(-shakeAmt,shakeAmt); shakeAmt*=0.8; if(shakeAmt<0.5) shakeAmt=0; }
  ctx.save();
  ctx.translate(sx,sy);

  drawBG();

  if(gameRunning){
    spawnCounter++;
    if(spawnCounter>=spawnInterval){
      spawnCounter=0;
      if (objects.length < MAX_OBJECTS) objects.push(new GameObject());
      spawnInterval=Math.max(35, 90 - score/80);
      if(score>200 && Math.random()<0.25 && objects.length < MAX_OBJECTS) objects.push(new GameObject());
    }

    // combo timer
    if(comboTimer>0){ comboTimer--; if(comboTimer===0){ combo=0; updateComboUI(); } }

    objects = objects.filter(o=>{
      if (!o.slashed && o.y > H + 80){
        if (!o.isBomb) applyMissPenalty(o.x, o.y);
        return false;
      }
      return !o.slashed && o.y < H + 100;
    });

    trimArrays();

    objects.forEach(o=>o.update());
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>p.update());
    floatTexts = floatTexts.filter(f=>f.life>0);
    floatTexts.forEach(f=>f.update());

    particles.forEach(p=>p.draw());
    objects.filter(o=>!o.slashed).forEach(o=>o.draw());
    floatTexts.forEach(f=>f.draw());
  }

  drawSlash();
  ctx.restore();
}

loop();
</script>
</body>
</html>
